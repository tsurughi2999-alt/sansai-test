function CalendarView() {
  const currentMonth = new Date().getMonth() + 1;
  return (
    <div>
      <div className="section-title">🍃 山菜カレンダー</div>
      <div className="section-desc">中部・北陸エリアの採取適期一覧。濃い緑が旬のピーク、薄い緑が採取可能期間です。</div>

      <div className="legend">
        <div className="legend-item"><div className="legend-dot" style={{background:"#2d4a2d"}}></div>旬・ピーク</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#6aab5e"}}></div>採取可能</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#f0f0f0"}}></div>採取外</div>
      </div>

      <div className="calendar-grid">
        <div className="cal-header" style={{background:"#1a2e1a"}}>山菜</div>
        {MONTHS.map((m, i) => (
          <div key={i} className="cal-header" style={i+1===currentMonth?{background:"#4a7a3d"}:{}}>{m}</div>
        ))}
        {SANSAI_DATA.map(s => {
          const peak = s.months[Math.floor(s.months.length / 2)];
          return [
            <div key={`l${s.id}`} className="cal-label">{s.emoji} {s.name}</div>,
            ...Array.from({length:12}, (_,i) => {
              const m = i + 1;
              const inSeason = s.months.includes(m);
              const isPeak = m === peak;
              return (
                <div
                  key={`${s.id}-${m}`}
                  className={`cal-cell${inSeason ? (isPeak ? " peak" : " active") : ""}${m===currentMonth?" current-month":""}`}
                  title={inSeason ? `${s.name} ${m}月 ${isPeak?"ピーク":"採取可"}` : ""}
                />
              );
            })
          ];
        })}
      </div>
    </div>
  );
}

const CALENDARS = [
  { id: "3", name: "tsurughi2999（メイン）", color: "#A47AE2" },
  { id: "5", name: "カーマ3岳会 登山",       color: "#1967D2" },

function ScheduleForm({ spots, onClose, onSuccess }) {
  const today = new Date().toISOString().split("T")[0];

  // 複数スポットエントリ
  const emptyStop = { spotId: "", customName: "", sansai: [] };
  const [form, setForm] = useState({
    date: today,
    endDate: today,
    calendarId: "3",
    meetingPlace: "",   // 集合場所
    stops: [{ ...emptyStop }], // 複数箇所
    members: [],        // 参加メンバー
    memo: "",
  });
  const [status, setStatus] = useState("idle");
  const MEMBER_LIST = ["田中","鈴木","佐藤","伊藤","山本"];

  // --- スポット操作 ---
  const addStop = () => setForm(f => ({ ...f, stops: [...f.stops, { ...emptyStop }] }));
  const removeStop = (i) => setForm(f => ({ ...f, stops: f.stops.filter((_,idx)=>idx!==i) }));
  const updateStop = (i, key, val) => setForm(f => {
    const arr = [...f.stops];
    arr[i] = { ...arr[i], [key]: val };
    return { ...f, stops: arr };
  });
  const toggleStopSansai = (stopIdx, sansaiId) => {
    setForm(f => {
      const arr = [...f.stops];
      const cur = arr[stopIdx].sansai;
      arr[stopIdx] = { ...arr[stopIdx], sansai: cur.includes(sansaiId) ? cur.filter(x=>x!==sansaiId) : [...cur, sansaiId] };
      return { ...f, stops: arr };
    });
  };
  const toggleMember = (name) => setForm(f => ({
    ...f, members: f.members.includes(name) ? f.members.filter(x=>x!==name) : [...f.members, name]
  }));

  // --- タイトル・説明文生成 ---
  const buildTitle = () => {
    const allSansai = [...new Set(form.stops.flatMap(s=>s.sansai))];
    const names = allSansai.map(id=>SANSAI_DATA.find(s=>s.id===id)?.name).filter(Boolean);
    let t = "🌿 山菜採り";
    if (names.length) t += `（${names.join("・")}）`;
    return t;
  };

  const buildDescription = () => {
    const lines = ["【山菜採り計画】", ""];
    if (form.meetingPlace) lines.push(`📍 集合場所：${form.meetingPlace}`);
    if (form.members.length) lines.push(`👥 メンバー：${form.members.join("、")}`);
    lines.push("");
    form.stops.forEach((stop, i) => {
      const spotName = spots.find(s=>String(s.id)===stop.spotId)?.name || stop.customName || "";
      const sansaiNames = stop.sansai.map(id=>SANSAI_DATA.find(s=>s.id===id)?.name).filter(Boolean);
      if (spotName || sansaiNames.length) {
        lines.push(`【第${i+1}箇所目】${spotName}`);
        if (sansaiNames.length) lines.push(`  採取予定：${sansaiNames.join("・")}`);
      }
    });
    if (form.memo) { lines.push(""); lines.push(`📝 メモ：${form.memo}`); }
    lines.push(""); lines.push("（山菜採り手帳より登録）");
    return lines.join("\n");
  };

  const handleSubmit = async () => {
    setStatus("loading");
    try {
      const firstStop = form.stops.find(s => s.spotId || s.customName);
      const location = firstStop
        ? (spots.find(s=>String(s.id)===firstStop.spotId)?.name || firstStop.customName)
        : form.meetingPlace;
      await onSuccess({
        calendarId: form.calendarId,
        title: buildTitle(),
        date: form.date,
        endDate: form.endDate,
        description: buildDescription(),
        location,
      });
      setStatus("done");
    } catch(e) {
      setStatus("error");
    }
  };

  if (status === "done") return (
    <div className="form-overlay" onClick={onClose}>
      <div className="form-box" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
        <div style={{fontSize:56, marginBottom:12}}>📅</div>
        <div style={{fontSize:20, fontWeight:700, color:"var(--forest)", marginBottom:8}}>Googleカレンダーを開きました！</div>
        <div style={{fontSize:13, color:"#666", marginBottom:8}}>内容を確認して「保存」を押してください。</div>
        <div style={{fontSize:12, color:"#aaa", marginBottom:20}}>※ポップアップがブロックされた場合はブラウザの設定を確認してください</div>
        <button className="btn-submit" onClick={onClose}>閉じる</button>
      </div>
    </div>
  );

  return (
    <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="form-box" style={{maxHeight:"88vh", overflowY:"auto"}}>
        <div className="form-title">🗓 採取プランを作成</div>

        {/* カレンダー選択 */}
        <div className="form-group">
          <label className="form-label">📅 登録先カレンダー</label>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {CALENDARS.map(cal => (
              <label key={cal.id} style={{display:"flex", alignItems:"center", gap:10, padding:"7px 12px",
                border:`2px solid ${form.calendarId===cal.id ? cal.color : "#eee"}`,
                borderRadius:8, cursor:"pointer",
                background: form.calendarId===cal.id ? cal.color+"18" : "white"}}>
                <input type="radio" name="cal" value={cal.id} checked={form.calendarId===cal.id}
                  onChange={()=>setForm(f=>({...f,calendarId:cal.id}))} style={{accentColor:cal.color}} />
                <span style={{width:10, height:10, borderRadius:"50%", background:cal.color, flexShrink:0}}></span>
                <span style={{fontSize:13, fontWeight:600}}>{cal.name}</span>
              </label>
            ))}
          </div>
        </div>

        {/* 日程 */}
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
          <div className="form-group">
            <label className="form-label">開始日</label>
            <input type="date" className="form-input" value={form.date}
              onChange={e=>setForm(f=>({...f, date:e.target.value, endDate:e.target.value}))} />
          </div>
          <div className="form-group">
            <label className="form-label">終了日</label>
            <input type="date" className="form-input" value={form.endDate} min={form.date}
              onChange={e=>setForm(f=>({...f, endDate:e.target.value}))} />
          </div>
        </div>

        {/* 集合場所 */}
        <div className="form-group">
          <label className="form-label">🚗 集合場所</label>
          <input className="form-input" value={form.meetingPlace}
            onChange={e=>setForm(f=>({...f, meetingPlace:e.target.value}))}
            placeholder="例：道の駅 瀬女 駐車場、〇〇IC など" />
        </div>

        {/* 参加メンバー */}
        <div className="form-group">

// ===== GPS ユーティリティ =====
function useGPS() {
  const [gps, setGps] = useState(null);         // {lat, lng, accuracy, timestamp}
  const [gpsStatus, setGpsStatus] = useState("idle"); // idle | loading | ok | error
  const [gpsError, setGpsError] = useState(null);

  const getLocation = () => {
    if (!navigator.geolocation) {
      setGpsStatus("error");
      setGpsError("このブラウザはGPSに対応していません");
      return;
    }
    setGpsStatus("loading");
    setGpsError(null);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setGps({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
          timestamp: new Date().toLocaleString("ja-JP"),
        });
        setGpsStatus("ok");
      },
      (err) => {
        setGpsStatus("error");
        setGpsError(
          err.code === 1 ? "位置情報の許可が必要です（設定→サイトの設定→位置情報）" :
          err.code === 2 ? "位置情報を取得できませんでした" :
          "タイムアウトしました。再試行してください"
        );
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  };

  const clearGps = () => { setGps(null); setGpsStatus("idle"); setGpsError(null); };

  const googleMapsUrl = gps
    ? `https://maps.google.com/?q=${gps.lat},${gps.lng}`
    : null;

  return { gps, gpsStatus, gpsError, getLocation, clearGps, googleMapsUrl };
}

function getOutdoorScore(wmo, wind, precip) {
  if ([95,96,99,65,75].includes(wmo)) return { score:0, label:"❌ 不向き", color:"#e74c3c" };
  if ([61,63,71,73,80,81,82].includes(wmo)) return { score:1, label:"⚠️ やや不向き", color:"#e67e22" };
  if (wind > 30) return { score:1, label:"⚠️ 強風注意", color:"#e67e22" };
  if ([0,1,2].includes(wmo) && precip < 1) return { score:3, label:"✅ 絶好の採取日", color:"#27ae60" };
  return { score:2, label:"🆗 まずまず", color:"#2980b9" };
}

      loadSetter(false);

                value={plannedDate}

                予報データがありません（7日先まで対応）
              </div>
            );
            const score = getOutdoorScore(day.wmo, day.wind, day.precip);
            const dateObj = new Date(plannedDate);
            const dayNames = ["日","月","火","水","木","金","土"];
            return (
              <div>

                <div style={{textAlign:"center", marginBottom:12}}>

                    {dateObj.getMonth()+1}月{dateObj.getDate()}日（{dayNames[dateObj.getDay()]}）の天気
                  </div>
                </div>

                <div style={{background:"linear-gradient(135deg,var(--forest),var(--moss))", borderRadius:12, padding:"20px", color:"white", textAlign:"center", marginBottom:12}}>
                  <div style={{fontSize:64}}>{WMO_EMOJI[day.wmo] ?? "🌡"}</div>
                  <div style={{fontSize:22, fontWeight:700, marginBottom:4}}>{WMO_CODE[day.wmo] ?? "-"}</div>
                  <div style={{fontSize:16, opacity:0.9}}>{day.min}℃ 〜 {day.max}℃</div>

                  <div style={{fontSize:28}}>{score.label.split(" ")[0]}</div>
                  <div>
                    <div style={{fontSize:16, fontWeight:700, color:score.color}}>{score.label.slice(score.label.indexOf(" ")+1)}</div>
                    <div style={{fontSize:12, color:"#666"}}>山菜採りの適性判定</div>
                  </div>
                </div>
                {/* 詳細 */}
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                  {[
                    { label:"降水量", val:`${day.precip} mm`, icon:"💧" },
                    { label:"最大風速", val:`${day.wind} km/h`, icon:"💨" },
                  ].map(item => (
                    <div key={item.label} style={{background:"var(--soil)", borderRadius:8, padding:"10px 12px", textAlign:"center"}}>
                      <div style={{fontSize:20}}>{item.icon}</div>
                      <div style={{fontSize:11, color:"#888", marginTop:2}}>{item.label}</div>
                      <div style={{fontSize:14, fontWeight:700, color:"var(--forest)"}}>{item.val}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ===== 天気サイトタブ ===== */}
      {mainTab === "sites" && (
        <div>
          <div style={{marginBottom:14}}>
            <label className="form-label">参照エリア（サイトで使用）</label>
            <select className="form-select" value={loc.name} onChange={e=>{
              const found = allLocs.find(l=>l.name===e.target.value);
              if(found) setLoc(found);
            }}>
              {allLocs.map(l => <option key={l.name} value={l.name}>{l.name}</option>)}
            </select>
          </div>
          <div style={{fontSize:12, color:"#888", marginBottom:14, padding:"8px 12px", background:"var(--soil)", borderRadius:8}}>
            💡 ボタンをタップすると外部天気サイトが開きます
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {WEATHER_SITES.map(site => (
              <a key={site.name}
                href={site.buildUrl(loc.lat, loc.lng, loc.name)}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  display:"flex", alignItems:"center", gap:14,
                  padding:"14px 18px",
                  background:"white", borderRadius:12,
                  boxShadow:"0 2px 10px rgba(0,0,0,0.07)",
                  border:"1px solid var(--mist)",
                  textDecoration:"none", color:"var(--ink)",
                  transition:"transform 0.15s, box-shadow 0.15s",
                }}>
                <div style={{fontSize:28}}>{site.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15, fontWeight:700, color:"var(--forest)"}}>{site.name}</div>
                  <div style={{fontSize:11, color:"#aaa", marginTop:2}}>{loc.name} の天気を表示</div>
                </div>
                <div style={{fontSize:18, color:"#aaa"}}>›</div>
              </a>
            ))}
          </div>

}

function AreaManager({ weatherLocations, setWeatherLocations }) {
  const [showForm, setShowForm] = useState(false);
  const [mode, setMode] = useState("preset"); // preset | manual
  const [form, setForm] = useState({ name:"", lat:"", lng:"" });
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [selectedPreset, setSelectedPreset] = useState(null);

  const addArea = () => {
    const area = mode === "preset" ? selectedPreset : form;
    if (!area || !area.name.trim()) return;
    const lat = parseFloat(area.lat);
    const lng = parseFloat(area.lng);
    if (isNaN(lat) || isNaN(lng)) return;
    setWeatherLocations(prev => [...prev, { id:`wl_${Date.now()}`, name: area.name.trim(), lat, lng }]);
    setForm({ name:"", lat:"", lng:"" });
    setSelectedPreset(null);
    setShowForm(false);
  };

  const deleteArea = (id) => {
    setWeatherLocations(prev => prev.filter(l => l.id !== id));
    setDeleteConfirm(null);
  };

  // デフォルトエリアかどうか（wl1〜wl7は初期値）
  const isDefault = (id) => /^wl[1-7]$/.test(id);

  return (
    <div style={{background:"white", borderRadius:14, padding:"16px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", border:"1px solid var(--mist)", marginBottom:20}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
        <div style={{fontSize:15, fontWeight:700, color:"var(--forest)"}}>📍 エリア管理</div>
        <button onClick={()=>setShowForm(true)} style={{
          background:"var(--forest)", color:"white", border:"none",
          borderRadius:8, padding:"6px 14px", cursor:"pointer",
          fontSize:12, fontWeight:600,
        }}>＋ エリアを追加</button>
      </div>

      {/* エリア一覧 */}
      <div style={{display:"flex", flexDirection:"column", gap:6}}>
        {weatherLocations.map(loc => (
          <div key={loc.id} style={{display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"var(--soil)", borderRadius:10}}>
            <span style={{fontSize:16}}>📍</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13, fontWeight:600, color:"var(--forest)"}}>{loc.name}</div>
              <div style={{fontSize:10, color:"#aaa"}}>緯度 {loc.lat.toFixed(3)} / 経度 {loc.lng.toFixed(3)}</div>
            </div>
            {isDefault(loc.id) ? (
              <span style={{fontSize:10, color:"#bbb", padding:"2px 8px", border:"1px solid #ddd", borderRadius:10}}>標準</span>
            ) : (
              <button onClick={()=>setDeleteConfirm(loc)} style={{
                background:"#fee", border:"none", borderRadius:8,
                padding:"4px 10px", cursor:"pointer", fontSize:11, fontWeight:600, color:"#c0392b"
              }}>削除</button>
            )}
          </div>
        ))}
      </div>

      {/* 追加フォーム */}
      {showForm && (
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="form-box">
            <div className="form-title">📍 エリアを追加</div>

            {/* モード切替 */}
            <div style={{display:"flex", gap:6, marginBottom:16, background:"var(--soil)", borderRadius:10, padding:4}}>
              {[{ id:"preset", label:"🗺 候補から選ぶ" }, { id:"manual", label:"✏️ 手動で入力" }].map(t=>(
                <button key={t.id} onClick={()=>{ setMode(t.id); setSelectedPreset(null); }} style={{
                  flex:1, padding:"8px 4px", border:"none", borderRadius:8, cursor:"pointer",
                  fontFamily:"'Noto Serif JP',serif", fontSize:12, fontWeight:600,
                  background: mode===t.id ? "var(--forest)" : "transparent",
                  color: mode===t.id ? "white" : "#888", transition:"all 0.2s",
                }}>{t.label}</button>
              ))}
            </div>

            {/* 候補から選ぶ */}
            {mode === "preset" && (
              <div className="form-group">
                <label className="form-label">エリアを選択</label>
                <div style={{display:"flex", flexWrap:"wrap", gap:8, maxHeight:200, overflowY:"auto"}}>
                  {AREA_PRESETS.filter(p => !weatherLocations.some(l=>l.name===p.name)).map(p=>(
                    <div key={p.name} onClick={()=>setSelectedPreset(p)}
                      style={{padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                        background: selectedPreset?.name===p.name ? "var(--forest)" : "var(--mist)",
                        color: selectedPreset?.name===p.name ? "white" : "#555",
                        border:`2px solid ${selectedPreset?.name===p.name ? "var(--forest)" : "transparent"}`,
                        transition:"all 0.15s"}}>
                      {p.name}
                    </div>
                  ))}
                </div>
                {selectedPreset && (
                  <div style={{marginTop:10, padding:"10px 14px", background:"var(--mist)", borderRadius:10, fontSize:12, color:"var(--forest)", fontWeight:600}}>
                    ✅ {selectedPreset.name}（緯度 {selectedPreset.lat} / 経度 {selectedPreset.lng}）
                  </div>
                )}
              </div>
            )}

            {/* 手動入力 */}
            {mode === "manual" && (
              <>
                <div className="form-group">
                  <label className="form-label">エリア名 *</label>
                  <input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：妙高・赤倉エリア" />
                </div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                  <div className="form-group">
                    <label className="form-label">緯度（北緯）</label>
                    <input className="form-input" type="number" step="0.0001" value={form.lat} onChange={e=>setForm(f=>({...f,lat:e.target.value}))} placeholder="例：36.9072" />
                  </div>
                  <div className="form-group">
                    <label className="form-label">経度（東経）</label>
                    <input className="form-input" type="number" step="0.0001" value={form.lng} onChange={e=>setForm(f=>({...f,lng:e.target.value}))} placeholder="例：138.1203" />
                  </div>
                </div>
                <div style={{fontSize:11, color:"#aaa", padding:"8px 12px", background:"var(--soil)", borderRadius:8}}>
                  💡 緯度経度はGoogleマップで右クリック→「この場所について」で確認できます
                </div>
              </>
            )}

            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>setShowForm(false)}>キャンセル</button>
              <button className="btn-submit"
                onClick={addArea}
                disabled={mode==="preset" ? !selectedPreset : !form.name || !form.lat || !form.lng}>
                追加する
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 削除確認 */}
      {deleteConfirm && (
        <div className="form-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="form-box" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40, marginBottom:12}}>🗑️</div>
            <div style={{fontSize:17, fontWeight:700, color:"var(--forest)", marginBottom:8}}>「{deleteConfirm.name}」を削除しますか？</div>
            <div style={{fontSize:13, color:"#888", marginBottom:24}}>天気予報のエリア一覧から削除されます</div>
            <div style={{display:"flex", gap:10, justifyContent:"center"}}>
              <button className="btn-cancel" onClick={()=>setDeleteConfirm(null)}>キャンセル</button>
              <button style={{padding:"10px 24px", background:"#c0392b", color:"white", border:"none", borderRadius:8, cursor:"pointer", fontFamily:"'Noto Serif JP',serif", fontSize:14, fontWeight:600}}
                onClick={()=>deleteArea(deleteConfirm.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PlanView({ spots, onScheduleSuccess, weatherLocations, setWeatherLocations }) {
  const currentMonth = new Date().getMonth() + 1;
  const [selectedMonth, setSelectedMonth] = useState(currentMonth);
  const [showSchedule, setShowSchedule] = useState(false);

  const available = SANSAI_DATA.filter(s => s.months.includes(selectedMonth));
  const peak = available.filter(s => s.months[Math.floor(s.months.length/2)] === selectedMonth);

  return (
    <div>
      <div className="section-title">📅 採取プラン</div>
      <div className="section-desc">月を選んで採れる山菜をチェック。Googleカレンダーへ採取予定を登録できます。</div>

      <WeatherWidget spots={spots} weatherLocations={weatherLocations} setWeatherLocations={setWeatherLocations} />

      {/* エリア管理 */}
      <AreaManager weatherLocations={weatherLocations} setWeatherLocations={setWeatherLocations} />

      <div className="plan-section">
        <div className="plan-title">🗓 月を選択</div>
        <div className="month-selector">
          {MONTHS.map((m, i) => (
            <button key={i} className={`month-btn${selectedMonth===i+1?" active":""}`} onClick={()=>setSelectedMonth(i+1)}>{m}</button>
          ))}
        </div>

        <div className="plan-title">
          🌿 {selectedMonth}月に採れる山菜
          <span style={{fontWeight:400, fontSize:13, color:"#888"}}>（{available.length}種類）</span>
        </div>

        {available.length === 0 ? (
          <div style={{color:"#aaa", textAlign:"center", padding:32}}>この月は採取できる山菜が少ない時期です</div>
        ) : (
          <div className="available-list">
            {available.map(s => (
              <div key={s.id} className="available-item">
                <div className="available-item-emoji">{s.emoji}</div>
                <div className="available-item-info">
                  <div className="available-item-name">{s.name}</div>
                  <div className="available-item-region">📍 {s.region}</div>
                </div>
                {peak.includes(s) && <div className="peak-badge">旬</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      <button className="add-btn" onClick={()=>setShowSchedule(true)} style={{background:"#1967D2"}}>
        📅 Googleカレンダーに登録
      </button>

      {showSchedule && (
        <ScheduleForm
          spots={spots}
          onClose={()=>setShowSchedule(false)}
          onSuccess={onScheduleSuccess}
        />
      )}
    </div>
  );
}

function SpotsView({ spots, setSpots }) {
  const [showForm, setShowForm] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [form, setForm] = useState({ name:"", notes:"", sansai:[] });

  const openAdd = () => {
    setForm({ name:"", notes:"", sansai:[] });
    setEditTarget(null);
    setShowForm(true);
  };

  const openEdit = (spot) => {
    setForm({ name: spot.name, notes: spot.notes, sansai: [...spot.sansai] });
    setEditTarget(spot);
    setShowForm(true);
  };

  const handleSave = () => {
    if (!form.name.trim()) return;
    if (editTarget) {
      setSpots(prev => prev.map(s => s.id === editTarget.id ? { ...s, ...form } : s));
    } else {
      setSpots(prev => [...prev, { id: Date.now(), name: form.name, lat:36.5, lng:137.0, sansai: form.sansai, notes: form.notes, visits: 0 }]);
    }
    setShowForm(false);
  };

  const handleDelete = (id) => {
    setSpots(prev => prev.filter(s => s.id !== id));
    setDeleteConfirm(null);
  };

  const toggleSansai = (id) => {
    setForm(f => ({ ...f, sansai: f.sansai.includes(id) ? f.sansai.filter(x=>x!==id) : [...f.sansai, id] }));
  };

  return (
    <div>
      <div className="section-title">📍 採取スポット</div>
      <div className="section-desc">よく行くポイントを管理。山菜の種類や覚え書きを記録できます。</div>

      <div className="spot-cards">
        {spots.map(spot => (
          <div key={spot.id} className="spot-card">
            <div className="spot-card-header">
              <div className="spot-name">📍 {spot.name}</div>
              <div className="spot-visits">訪問 {spot.visits} 回</div>
            </div>
            <div className="spot-card-body">
              <div className="spot-tags">
                {spot.sansai.map(sid => {
                  const s = SANSAI_DATA.find(x=>x.id===sid);
                  return s ? <span key={sid} className="spot-tag">{s.emoji} {s.name}</span> : null;
                })}
              </div>
              <div className="spot-notes">{spot.notes}</div>
              {/* 操作ボタン */}
              <div style={{display:"flex", gap:8, marginTop:12}}>
                <button
                  onClick={()=>openEdit(spot)}
                  style={{flex:1, padding:"7px 0", background:"var(--mist)", border:"none", borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:600, color:"var(--forest)"}}>
                  ✏️ 編集
                </button>
                <button
                  onClick={()=>setDeleteConfirm(spot)}
                  style={{flex:1, padding:"7px 0", background:"#fee", border:"none", borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:600, color:"#c0392b"}}>
                  🗑️ 削除
                </button>
              </div>
            </div>
          </div>
        ))}
        {spots.length === 0 && (
          <div style={{gridColumn:"1/-1", textAlign:"center", padding:40, color:"#ccc", fontSize:14}}>スポットがありません。追加してください。</div>
        )}
      </div>

      <button className="add-btn" onClick={openAdd}>＋ スポットを追加</button>

      {/* 追加・編集フォーム */}
      {showForm && (
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="form-box">
            <div className="form-title">{editTarget ? "✏️ スポットを編集" : "📍 新スポット登録"}</div>
            <div className="form-group">
              <label className="form-label">スポット名 *</label>
              <input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：〇〇林道・□□沢" />
            </div>
            <div className="form-group">
              <label className="form-label">採れる山菜</label>
              <div className="sansai-check-grid">
                {SANSAI_DATA.map(s => (
                  <div key={s.id} className={`sansai-check${form.sansai.includes(s.id)?" selected":""}`} onClick={()=>toggleSansai(s.id)}>
                    {s.emoji} {s.name}
                  </div>
                ))}
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">メモ・覚え書き</label>
              <textarea className="form-textarea" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="採取ポイントや注意事項など..." />
            </div>
            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>setShowForm(false)}>キャンセル</button>
              <button className="btn-submit" onClick={handleSave}>{editTarget ? "保存する" : "登録する"}</button>
            </div>
          </div>
        </div>
      )}

      {/* 削除確認ダイアログ */}
      {deleteConfirm && (
        <div className="form-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="form-box" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40, marginBottom:12}}>🗑️</div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--forest)", marginBottom:8}}>
              {deleteConfirm.name} を削除しますか？
            </div>

function BlogView({ posts, setPosts, spots, members }) {
  const [showForm, setShowForm] = useState(false);

  const [lightbox, setLightbox] = useState(null); // {images, index}

  const handleAdd = () => {
    if (!form.title.trim() || !form.content.trim()) return;
    setPosts(prev => [{ id: Date.now(), ...form, spot: form.spot ? parseInt(form.spot) : null, likes: 0 }, ...prev]);
    setForm({ title:"", content:"", sansai:[], spot:"", author: members[0]?.name ?? "", date: new Date().toISOString().split("T")[0], photos: [] });
    setShowForm(false);
  };

  const toggleSansai = (id) => {
    setForm(f => ({ ...f, sansai: f.sansai.includes(id) ? f.sansai.filter(x=>x!==id) : [...f.sansai, id] }));
  };

  const handleLike = (id) => {
    setPosts(prev => prev.map(p => p.id===id ? {...p, likes: p.likes+1} : p));
  };

  return (
    <div>
      <div className="section-title">📝 採取ブログ</div>

      <div className="blog-list">
        {posts.map(post => {
          const spot = spots.find(s=>s.id===post.spot);
          return (
            <div key={post.id} className="blog-card">
              <div className="blog-meta">
                <span className="blog-author">{post.author}</span>

                {spot && <span>📍 {spot.name}</span>}

              </div>
              <div className="blog-title">{post.title}</div>

              {post.photos?.length > 0 && (
                <div className="blog-photos">
                  {post.photos.map((src, i) => (
                    <div key={i} className="blog-photo" onClick={()=>setLightbox({images:post.photos, index:i})}>
                      <img src={src} alt={`post-photo-${i}`} />

                  ))}
                </div>
              )}

              <div className="blog-content">{post.content}</div>
              <div className="blog-footer">
                {post.sansai.map(sid => {

                <button className="like-btn" onClick={()=>handleLike(post.id)}>❤ {post.likes}</button>
              </div>
            </div>
          );

      </div>

      <button className="add-btn" onClick={()=>setShowForm(true)}>＋ 記録を投稿</button>

      {lightbox && (
        <Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)} />
      )}

      {showForm && (
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="form-box">
            <div className="form-title">📝 採取記録を投稿</div>
            <div className="form-group">
              <label className="form-label">投稿者</label>
              <select className="form-select" value={form.author} onChange={e=>setForm(f=>({...f,author:e.target.value}))}>
                {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}

            </div>
            <div className="form-group">
              <label className="form-label">日付</label>
              <input type="date" className="form-input" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">タイトル *</label>
              <input className="form-input" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="例：白山麓でコシアブラ大豊作！" />
            </div>
            <div className="form-group">
              <label className="form-label">採取した山菜</label>
              <div className="sansai-check-grid">
                {SANSAI_DATA.map(s => (
                  <div key={s.id} className={`sansai-check${form.sansai.includes(s.id)?" selected":""}`} onClick={()=>toggleSansai(s.id)}>
                    {s.emoji} {s.name}

              </div>
            </div>
            <div className="form-group">
              <label className="form-label">スポット</label>
              <select className="form-select" value={form.spot} onChange={e=>setForm(f=>({...f,spot:e.target.value}))}>
                <option value="">選択してください</option>
                {spots.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">記録・感想 *</label>
              <textarea className="form-textarea" value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="採取の様子、量、料理した感想など..." />
            </div>

const ROLES = ["採取リーダー", "料理担当", "ナビ担当", "記録係", "新入り", "ベテラン", "一般"];
const RANKS = ["初級（初心者）", "中級", "上級", "エキスパート", "マスター", "師匠・名人"];
const RANK_COLOR = {
  "初級（初心者）": "#95a5a6",
  "中級":           "#27ae60",
  "上級":           "#2980b9",
  "エキスパート":   "#8e44ad",
  "マスター":       "#e67e22",
  "師匠・名人":     "#c0392b",
};
const RANK_BADGE = {
  "初級（初心者）": "🌱",
  "中級":           "🌿",
  "上級":           "🍃",
  "エキスパート":   "⭐",
  "マスター":       "🌟",
  "師匠・名人":     "👑",
};

function MembersView({ members, setMembers }) {

  const [showForm, setShowForm] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [avatarModal, setAvatarModal] = useState(null); // 対象member
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);   // base64 SVG文字列
  const [camAuto, setCamAuto] = useState(false);
  const camRef = React.useRef(null);

  const emptyForm = {
    name: "", nickname: "", role: "一般", rank: "初級（初心者）",
    memo: "", joined: new Date().toISOString().split("T")[0],
    photo: null,   // base64 or null
    avatar: null,  // AI生成アバター base64 or null
  };
  const [form, setForm] = useState(emptyForm);

  // ── カメラ自動起動 ──
  useEffect(() => {
    if (camAuto && camRef.current) {
      setTimeout(() => camRef.current?.click(), 300);
    }
  }, [camAuto, showForm]);

  // ── 写真読み込み ──
  const loadPhoto = (files, field = "photo") => {
    const file = files[0];
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = e => setForm(f => ({ ...f, [field]: e.target.result }));
    reader.readAsDataURL(file);
  };

  // ── AI アバター生成（Claude API）──
  const generateAvatar = async (photoBase64) => {
    setAiLoading(true);
    setAiResult(null);
    try {
      // Base64からdata:image/...;base64, を除いたデータを取り出す
      const b64data = photoBase64.split(",")[1];
      const mediaType = photoBase64.split(";")[0].split(":")[1];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1500,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: mediaType, data: b64data }
              },
              {
                type: "text",
                text: `この写真の人物をアニメ・マンガ風のSVGアバターに変換してください。
以下の条件でSVGコードのみを出力してください：
- viewBox="0 0 200 200" の円形アバター
- アニメ・マンガ風のシンプルなイラスト（大きな目、シンプルな輪郭）
- 写真の髪色・肌色・服の色を参考にする
- 背景は緑系グラデーション（山菜採りテーマ）
- 顔のパーツを大きくわかりやすく
- SVGタグのみ出力（説明文不要）`
              }
            ]
          }]
        })
      });
      const data = await response.json();
      const svgText = data.content?.[0]?.text ?? "";
      // SVGタグだけ抽出
      const match = svgText.match(/<svg[\s\S]*<\/svg>/i);
      if (match) {
        const svgB64 = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(match[0])));
        setAiResult(svgB64);
      } else {
        throw new Error("SVG not found");
      }
    } catch(e) {
      console.error(e);
      setAiResult("error");
    } finally {
      setAiLoading(false);
    }
  };

  // ── 保存 ──
  const handleSave = () => {
    if (!form.name.trim()) return;

    } else {
      setMembers(prev => [...prev, { id: Date.now(), ...form }]);

    setForm(emptyForm);
    setEditTarget(null);
    setCamAuto(false);
    setShowForm(false);

              <label className="form-label">役割</label>

                  <div key={r} onClick={()=>setForm(f=>({...f,role:r}))}
                    style={{padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                      background:form.role===r?(ROLE_COLOR[r]??"#555"):"var(--mist)",
                      color:form.role===r?"white":"#555",

            {/* ランク */}

              <label className="form-label">ランク</label>
              <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                {["初級（初心者）","中級","上級","エキスパート","マスター","師匠・名人"].map(r=>(
                  <div key={r} onClick={()=>setForm(f=>({...f,rank:r}))}
                    style={{padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                      background:form.rank===r?(RANK_COLOR[r]??"#555"):"var(--mist)",
                      color:form.rank===r?"white":"#555",
                      border:`2px solid ${form.rank===r?(RANK_COLOR[r]??"#555"):"transparent"}`,
                      transition:"all 0.15s"}}>
                    {RANK_BADGE[r]} {r}
                  </div>
                ))}
              </div>
            </div>

            {/* 参加日・メモ */}
            <div className="form-group">
              <label className="form-label">参加日</label>
              <input type="date" className="form-input" value={form.joined}
                onChange={e=>setForm(f=>({...f,joined:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">メモ</label>
              <textarea className="form-textarea" style={{minHeight:60}} value={form.memo}
                onChange={e=>setForm(f=>({...f,memo:e.target.value}))}
                placeholder="得意な山菜・担当エリアなど..." />
            </div>

            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>setShowForm(false)}>キャンセル</button>
              <button className="btn-submit" onClick={handleSave}>
                {editTarget ? "保存する" : "追加する"}

            </div>
          </div>
        </div>
      )}

      {/* ───────── アバター設定モーダル（カードタップ時）───────── */}
      {avatarModal && (
        <div className="form-overlay" onClick={()=>{ setAvatarModal(null); setAiResult(null); }}>
          <div className="form-box" style={{maxHeight:"88vh", overflowY:"auto"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center", marginBottom:16}}>
              <AvatarDisplay member={avatarModal} size={80} />
              <div style={{fontSize:18, fontWeight:700, color:"var(--forest)", marginTop:8}}>
                {avatarModal.name}
                {avatarModal.nickname && <span style={{fontSize:13, color:"#888"}}> 「{avatarModal.nickname}」</span>}
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">📷 写真・アバターを変更</label>
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                <label style={{display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                  background:"var(--soil)", border:"2px dashed var(--fern)", borderRadius:10,
                  cursor:"pointer", fontSize:13, fontWeight:600, color:"var(--moss)"}}>
                  <input type="file" accept="image/*" style={{display:"none"}}
                    onChange={e=>{
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => {
                        setMembers(prev=>prev.map(m=>m.id===avatarModal.id?{...m,photo:ev.target.result}:m));
                        setAvatarModal(prev=>({...prev,photo:ev.target.result}));
                      };
                      reader.readAsDataURL(file);
                    }} />
                  🖼 フォトから選択
                </label>
                <label style={{display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                  background:"#e8f5e9", border:"2px dashed #43a047", borderRadius:10,
                  cursor:"pointer", fontSize:13, fontWeight:600, color:"#2e7d32"}}>
                  <input type="file" accept="image/*" capture="user" style={{display:"none"}}
                    onChange={e=>{
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => {
                        setMembers(prev=>prev.map(m=>m.id===avatarModal.id?{...m,photo:ev.target.result}:m));
                        setAvatarModal(prev=>({...prev,photo:ev.target.result}));
                      };
                      reader.readAsDataURL(file);
                    }} />
                  📸 カメラで撮影（自動起動）
                </label>
              </div>
            </div>

            {/* AIアバター生成 */}
            {avatarModal.photo && (
              <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",
                borderRadius:12, padding:"14px", marginBottom:12}}>
                <div style={{fontSize:13, fontWeight:700, color:"#e2e2e2", marginBottom:6}}>
                  🤖 AIアニメ・アバター変換
                </div>
                {aiLoading && (
                  <div style={{color:"#90caf9", fontSize:12, textAlign:"center", padding:8}}>
                    🌀 AI生成中...
                  </div>
                )}
                {aiResult && aiResult !== "error" && (
                  <div style={{textAlign:"center", marginBottom:10}}>
                    <img src={aiResult} style={{width:80, height:80, borderRadius:"50%",
                      border:"3px solid #90caf9"}} />
                    <div style={{fontSize:11, color:"#90caf9", marginTop:4}}>✅ 生成完了！</div>
                  </div>
                )}
                <div style={{display:"flex", gap:8}}>
                  <button onClick={()=>{ setAiResult(null); generateAvatar(avatarModal.photo); }}
                    disabled={aiLoading}
                    style={{flex:1, padding:"9px", background:"#3949ab", color:"white", border:"none",
                      borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:600}}>
                    {aiLoading ? "生成中..." : "✨ AIアバター生成"}
                  </button>
                  {aiResult && aiResult !== "error" && (
                    <button onClick={()=>{
                      setMembers(prev=>prev.map(m=>m.id===avatarModal.id?{...m,avatar:aiResult}:m));
                      setAvatarModal(prev=>({...prev,avatar:aiResult}));
                      setAiResult(null);
                    }} style={{flex:1, padding:"9px", background:"#27ae60", color:"white", border:"none",
                      borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:600}}>
                      ✅ このアバターを設定
                    </button>
                  )}
                </div>
              </div>
            )}

            {avatarModal.avatar && (
              <button onClick={()=>{
                setMembers(prev=>prev.map(m=>m.id===avatarModal.id?{...m,avatar:null}:m));
                setAvatarModal(prev=>({...prev,avatar:null}));
              }} style={{width:"100%", padding:"8px", background:"#fee", border:"none",
                borderRadius:8, cursor:"pointer", fontSize:12, color:"#c0392b", fontWeight:600, marginBottom:12}}>
                🗑 AIアバターを削除して写真に戻す
              </button>
            )}

            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>openEdit(avatarModal)}>✏️ 詳細編集</button>
              <button className="btn-submit" onClick={()=>{ setAvatarModal(null); setAiResult(null); }}>閉じる</button>
            </div>
          </div>
        </div>
      )}

      {/* 削除確認 */}
      {deleteConfirm && (
        <div className="form-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="form-box" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40, marginBottom:12}}>🗑️</div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--forest)", marginBottom:8}}>
              {deleteConfirm.name} を削除しますか？
            </div>
            <div style={{fontSize:13, color:"#888", marginBottom:24}}>この操作は元に戻せません。</div>
            <div style={{display:"flex", gap:10, justifyContent:"center"}}>
              <button className="btn-cancel" onClick={()=>setDeleteConfirm(null)}>キャンセル</button>
              <button style={{padding:"10px 24px", background:"#c0392b", color:"white", border:"none",
                borderRadius:8, cursor:"pointer", fontFamily:"'Noto Serif JP',serif", fontSize:14, fontWeight:600}}
                onClick={()=>{ setMembers(prev=>prev.filter(m=>m.id!==deleteConfirm.id)); setDeleteConfirm(null); }}>
                削除する
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PatrolView({ spots, onScheduleSuccess, showToast }) {
  const today = new Date().toISOString().split("T")[0];
  const currentMonth = new Date().getMonth() + 1;

  // ===== STATE =====
  const [patrolTab, setPatrolTab] = useState("records"); // records | schedule | growth
  const [records, setRecords] = useState([
    {
      id: 1, date: "2026-05-08", spotId: 1, patrolledBy: "田中",
      sansaiStatus: [
        { sansaiId: 3, status: "旬", quantity: "多い", memo: "林道沿い一面に群生" },
        { sansaiId: 2, status: "やや遅め", quantity: "少ない", memo: "もう少しで終わり" },
      ],
      overallCondition: "良好", illegalActivity: false, photos: [], notes: "今年は例年より1週間早い",
    },
    {
      id: 2, date: "2026-04-25", spotId: 2, patrolledBy: "鈴木",
      sansaiStatus: [
        { sansaiId: 2, status: "旬", quantity: "普通", memo: "大型株多数" },
        { sansaiId: 5, status: "もうすぐ", quantity: "普通", memo: "来週が見頃" },
      ],
      overallCondition: "良好", illegalActivity: false, photos: [], notes: "",
    },
  ]);
  const [schedules, setSchedules] = useState([
    { id: 1, spotId: 1, date: "2026-06-05", assignee: "田中", memo: "コシアブラ終盤確認" },
    { id: 2, spotId: 2, date: "2026-06-10", assignee: "鈴木", memo: "ゼンマイ状況確認" },
    { id: 3, spotId: 3, date: "2026-06-15", assignee: "佐藤", memo: "ワラビ採取可否チェック" },
  ]);

  // フォーム
  const [showRecordForm, setShowRecordForm] = useState(false);
  const [showScheduleForm, setShowScheduleForm] = useState(false);
  const [selectedRecord, setSelectedRecord] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  const emptyRecord = {
    date: today, spotId: spots[0]?.id ?? "", patrolledBy: "",
    sansaiStatus: [], overallCondition: "良好",
    illegalActivity: false, photos: [], notes: "", gps: null,
  };
  const [recForm, setRecForm] = useState(emptyRecord);
  const [autoCam, setAutoCam] = useState(false);
  const patrolGPS = useGPS();

  const emptySchedule = { date: today, spotId: spots[0]?.id ?? "", assignee: "", memo: "", calendarId: "3" };
  const [schForm, setSchForm] = useState(emptySchedule);

  // ===== 状態定義 =====
  const GROWTH_STATUS = ["芽吹き前", "もうすぐ", "旬", "やや遅め", "終わり", "不明"];
  const QUANTITY = ["多い", "普通", "少ない", "ほぼなし"];
  const CONDITION = ["良好", "普通", "やや不良", "不良"];
  const STATUS_COLOR = {
    "芽吹き前":"#90a4ae", "もうすぐ":"#66bb6a", "旬":"#2e7d32",
    "やや遅め":"#ffa726", "終わり":"#bdbdbd", "不明":"#90a4ae",
  };
  const QTY_COLOR = { "多い":"#2e7d32", "普通":"#1565c0", "少ない":"#e65100", "ほぼなし":"#b71c1c" };
  const MEMBERS_LIST = ["田中", "鈴木", "佐藤", "伊藤", "山本"];

  // ===== ヘルパー =====
  const spotName = (id) => spots.find(s => s.id === Number(id))?.name ?? "不明";
  const sansaiName = (id) => SANSAI_DATA.find(s => s.id === id)?.name ?? "不明";
  const sansaiEmoji = (id) => SANSAI_DATA.find(s => s.id === id)?.emoji ?? "🌿";

  const addSansaiStatus = () => {
    setRecForm(f => ({ ...f, sansaiStatus: [...f.sansaiStatus, { sansaiId: 1, status: "旬", quantity: "普通", memo: "" }] }));
  };
  const updateSansaiStatus = (i, key, val) => {
    setRecForm(f => {
      const arr = [...f.sansaiStatus];
      arr[i] = { ...arr[i], [key]: key === "sansaiId" ? Number(val) : val };
      return { ...f, sansaiStatus: arr };
    });
  };
  const removeSansaiStatus = (i) => {
    setRecForm(f => ({ ...f, sansaiStatus: f.sansaiStatus.filter((_, idx) => idx !== i) }));
  };

  const handlePhotoUpload = (files) => {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = (e) => setRecForm(f => ({ ...f, photos: [...f.photos, e.target.result] }));
      reader.readAsDataURL(file);
    });
  };

  const saveRecord = () => {
    if (!recForm.date || !recForm.spotId) return;
    setRecords(prev => [{ id: Date.now(), ...recForm, spotId: Number(recForm.spotId), gps: patrolGPS.gps },...prev]);
    setRecForm(emptyRecord);
    patrolGPS.clearGps();
    setAutoCam(false);
    setShowRecordForm(false);
  };

  const deleteRecord = (id) => {
    setRecords(prev => prev.filter(r => r.id !== id));
    setDeleteConfirm(null);
    setSelectedRecord(null);
  };

  const [calLoading, setCalLoading] = useState(false);

  const saveSchedule = async () => {
    if (!schForm.date || !schForm.spotId) return;
    const newSch = { id: Date.now(), ...schForm, spotId: Number(schForm.spotId) };
    setSchedules(prev => [...prev, newSch]);
    setSchForm(emptySchedule);
    setShowScheduleForm(false);

    // Googleカレンダーに自動登録
    if (onScheduleSuccess) {
      setCalLoading(true);
      const sName = spots.find(s => s.id === newSch.spotId)?.name ?? "";
      const title = `🔍 山菜パトロール：${sName}`;
      const desc = [
        `担当：${newSch.assignee || "未定"}`,
        newSch.memo ? `目的：${newSch.memo}` : "",
        `スポット：${sName}`,
        "（山菜採り手帳・パトロール機能より自動登録）",
      ].filter(Boolean).join("\n");
      try {
        await onScheduleSuccess({
          calendarId: "3",
          title,
          date: newSch.date,
          endDate: newSch.date,
          description: desc,
          location: sName,
        });
      } catch(e) {
        showToast && showToast("⚠️ カレンダー画面を開けませんでした。ポップアップ許可を確認してください", "err");
      } finally {
        setCalLoading(false);
      }
    }
  };

  const deleteSchedule = (id) => setSchedules(prev => prev.filter(s => s.id !== id));

  // ===== 統計 =====
  const thisMonthRecords = records.filter(r => r.date.startsWith(`2026-${String(currentMonth).padStart(2,"0")}`));
  const upcomingSchedules = schedules.filter(s => s.date >= today).sort((a,b) => a.date.localeCompare(b.date));

  // 山菜ごとの最新状況集計
  const latestGrowth = {};
  records.forEach(rec => {
    rec.sansaiStatus.forEach(ss => {
      if (!latestGrowth[ss.sansaiId] || rec.date > latestGrowth[ss.sansaiId].date) {
        latestGrowth[ss.sansaiId] = { ...ss, date: rec.date, spot: spotName(rec.spotId) };
      }
    });
  });

  // ===== STYLES (inline) =====
  const cardStyle = { background:"white", borderRadius:14, padding:"16px", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", border:"1px solid var(--mist)", marginBottom:12 };

  return (
    <div>
      <div className="section-title">🔍 山菜パトロール</div>
      <div className="section-desc">スポットの巡回記録・生育状況・スケジュール管理</div>

      {/* サマリー */}
      <div style={{display:"flex", gap:10, marginBottom:20, flexWrap:"wrap"}}>
        {[
          { label:"今月の巡回", val:`${thisMonthRecords.length}回`, icon:"🔍" },
          { label:"総記録数", val:`${records.length}件`, icon:"📋" },
          { label:"次回予定", val: upcomingSchedules.length ? upcomingSchedules[0].date.slice(5).replace("-","月")+"日" : "なし", icon:"📅" },
        ].map(item => (
          <div key={item.label} style={{flex:1, minWidth:90, background:"white", borderRadius:12, padding:"10px 14px", boxShadow:"0 2px 8px rgba(0,0,0,0.07)", textAlign:"center", border:"1px solid var(--mist)"}}>
            <div style={{fontSize:20}}>{item.icon}</div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--forest)"}}>{item.val}</div>
            <div style={{fontSize:11, color:"#888"}}>{item.label}</div>
          </div>
        ))}
      </div>

      {/* タブ切替 */}
      <div style={{display:"flex", gap:4, marginBottom:20, background:"var(--soil)", borderRadius:10, padding:4}}>
        {[
          { id:"records",  label:"📋 巡回記録" },
          { id:"growth",   label:"🌱 生育状況" },
          { id:"schedule", label:"📅 スケジュール" },
        ].map(t => (
          <button key={t.id} onClick={()=>setPatrolTab(t.id)} style={{
            flex:1, padding:"9px 4px", border:"none", borderRadius:8, cursor:"pointer",
            fontFamily:"'Noto Serif JP',serif", fontSize:12, fontWeight:600,
            background: patrolTab===t.id ? "var(--forest)" : "transparent",
            color: patrolTab===t.id ? "white" : "#888", transition:"all 0.2s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ===== 巡回記録タブ ===== */}
      {patrolTab === "records" && (
        <div>
          {records.length === 0 && (
            <div style={{textAlign:"center", padding:40, color:"#ccc"}}>まだ記録がありません</div>
          )}
          {records.map(rec => (
            <div key={rec.id} style={{...cardStyle, cursor:"pointer", borderLeft:`4px solid ${rec.illegalActivity ? "#c0392b" : "var(--fern)"}`}}
              onClick={()=>setSelectedRecord(rec)}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8}}>
                <div>
                  <div style={{fontSize:15, fontWeight:700, color:"var(--forest)"}}>{spotName(rec.spotId)}</div>
                  <div style={{fontSize:11, color:"#888", marginTop:2}}>🗓 {rec.date} 👤 {rec.patrolledBy}</div>
                </div>
                <div style={{display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end"}}>
                  <span style={{fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20,
                    background: rec.overallCondition==="良好" ? "#e8f5e9" : rec.overallCondition==="不良" ? "#fdecea" : "#fff8e1",
                    color: rec.overallCondition==="良好" ? "#2e7d32" : rec.overallCondition==="不良" ? "#c0392b" : "#e65100"
                  }}>{rec.overallCondition}</span>
                  {rec.illegalActivity && <span style={{fontSize:10, fontWeight:700, background:"#c0392b", color:"white", padding:"2px 8px", borderRadius:20}}>⚠️ 不法採取</span>}
                </div>
              </div>
              {/* 山菜状況サマリー */}
              <div style={{display:"flex", flexWrap:"wrap", gap:6, marginBottom: rec.photos?.length ? 8 : 0}}>
                {rec.sansaiStatus.map((ss, i) => (
                  <span key={i} style={{fontSize:11, fontWeight:600, padding:"3px 8px", borderRadius:20,
                    background: STATUS_COLOR[ss.status]+"22", color: STATUS_COLOR[ss.status],
                    border:`1px solid ${STATUS_COLOR[ss.status]}`}}>
                    {sansaiEmoji(ss.sansaiId)} {sansaiName(ss.sansaiId)}：{ss.status}

                ))}
              </div>
              {rec.photos?.length > 0 && (
                <div style={{display:"flex", gap:6, marginTop:8}}>
                  {rec.photos.slice(0,3).map((p,i) => (
                    <div key={i} style={{width:52, height:52, borderRadius:8, overflow:"hidden", flexShrink:0}}>
                      <img src={p} style={{width:"100%", height:"100%", objectFit:"cover"}} />
                    </div>
                  ))}
                  {rec.photos.length > 3 && <div style={{width:52, height:52, borderRadius:8, background:"#eee", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#888", fontWeight:700}}>+{rec.photos.length-3}</div>}
                </div>
              )}
            </div>
          ))}
          <div style={{display:"flex", gap:10}}>
            <button className="add-btn" style={{flex:1, justifyContent:"center"}}
              onClick={()=>{ setRecForm(emptyRecord); patrolGPS.clearGps(); setAutoCam(false); setShowRecordForm(true); }}>
              ＋ 巡回記録を追加
            </button>
            <button style={{padding:"12px 16px", background:"#e8f5e9", border:"2px solid #43a047", borderRadius:8,
              cursor:"pointer", fontSize:13, fontWeight:600, color:"#2e7d32", display:"flex", alignItems:"center", gap:6}}
              onClick={()=>{ setRecForm(emptyRecord); patrolGPS.clearGps(); setAutoCam(true); setShowRecordForm(true); }}>
              📸 カメラ起動して記録
            </button>
          </div>
        </div>
      )}

      {/* ===== 生育状況タブ ===== */}
      {patrolTab === "growth" && (
        <div>
          <div style={{fontSize:13, color:"#888", marginBottom:16, padding:"10px 14px", background:"var(--soil)", borderRadius:10}}>
            💡 各スポットの最新パトロール記録から生育状況を集計しています
          </div>
          {Object.keys(latestGrowth).length === 0 ? (
            <div style={{textAlign:"center", padding:40, color:"#ccc"}}>巡回記録を追加すると生育状況が表示されます</div>
          ) : (
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              {Object.entries(latestGrowth).map(([sansaiId, info]) => (
                <div key={sansaiId} style={{...cardStyle, marginBottom:0, display:"flex", alignItems:"center", gap:14}}>
                  <div style={{fontSize:32}}>{sansaiEmoji(Number(sansaiId))}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15, fontWeight:700, color:"var(--forest)"}}>{sansaiName(Number(sansaiId))}</div>
                    <div style={{fontSize:11, color:"#888"}}>📍 {info.spot} ・ 🗓 {info.date}</div>
                    {info.memo && <div style={{fontSize:12, color:"#555", marginTop:3}}>{info.memo}</div>}
                  </div>
                  <div style={{display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end"}}>
                    <span style={{fontSize:12, fontWeight:700, padding:"4px 12px", borderRadius:20,
                      background: STATUS_COLOR[info.status]+"22", color: STATUS_COLOR[info.status],
                      border:`1px solid ${STATUS_COLOR[info.status]}`}}>{info.status}</span>
                    <span style={{fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:20,
                      background: QTY_COLOR[info.quantity]+"18", color: QTY_COLOR[info.quantity]}}>量：{info.quantity}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* スポット別サマリー */}
          <div style={{marginTop:24}}>
            <div style={{fontSize:15, fontWeight:700, color:"var(--forest)", marginBottom:12}}>📍 スポット別 最終巡回</div>
            {spots.map(spot => {
              const lastRec = records.filter(r => r.spotId === spot.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
              const daysSince = lastRec ? Math.floor((new Date(today)-new Date(lastRec.date))/(1000*60*60*24)) : null;
              return (
                <div key={spot.id} style={{...cardStyle, marginBottom:8, display:"flex", alignItems:"center", gap:12}}>
                  <div style={{fontSize:24}}>📍</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14, fontWeight:700, color:"var(--forest)"}}>{spot.name}</div>
                    {lastRec ? (
                      <div style={{fontSize:11, color:"#888"}}>最終巡回: {lastRec.date}（{daysSince}日前）</div>
                    ) : (
                      <div style={{fontSize:11, color:"#bbb"}}>まだ巡回記録なし</div>
                    )}
                  </div>
                  <div style={{fontSize:12, fontWeight:700, padding:"4px 12px", borderRadius:20,
                    background: daysSince === null ? "#f5f5f5" : daysSince <= 7 ? "#e8f5e9" : daysSince <= 14 ? "#fff8e1" : "#fdecea",
                    color: daysSince === null ? "#bbb" : daysSince <= 7 ? "#2e7d32" : daysSince <= 14 ? "#e65100" : "#c0392b",
                  }}>
                    {daysSince === null ? "未巡回" : daysSince <= 7 ? "✅ 最近" : daysSince <= 14 ? "⚠️ やや古い" : "❗ 要巡回"}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ===== スケジュールタブ ===== */}
      {patrolTab === "schedule" && (
        <div>
          {/* 今後の予定 */}
          <div style={{fontSize:13, fontWeight:700, color:"var(--forest)", marginBottom:10}}>📅 今後の巡回予定</div>
          {upcomingSchedules.length === 0 && (
            <div style={{textAlign:"center", padding:32, color:"#ccc", marginBottom:16}}>予定がありません</div>
          )}
          {upcomingSchedules.map(sch => {
            const d = new Date(sch.date);
            const dayNames = ["日","月","火","水","木","金","土"];
            const daysSince = Math.floor((new Date(sch.date)-new Date(today))/(1000*60*60*24));
            return (
              <div key={sch.id} style={{...cardStyle, display:"flex", alignItems:"center", gap:12, marginBottom:8}}>
                <div style={{width:48, textAlign:"center", flexShrink:0}}>
                  <div style={{fontSize:11, color:"#888"}}>{d.getMonth()+1}/{d.getDate()}</div>
                  <div style={{fontSize:13, fontWeight:700, color:"var(--forest)"}}>{dayNames[d.getDay()]}曜</div>
                  <div style={{fontSize:10, color: daysSince<=3?"#c0392b":daysSince<=7?"#e67e22":"#888"}}>{daysSince===0?"今日":daysSince+"日後"}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14, fontWeight:700, color:"var(--forest)"}}>{spotName(sch.spotId)}</div>
                  <div style={{fontSize:12, color:"#888"}}>👤 {sch.assignee}</div>
                  {sch.memo && <div style={{fontSize:12, color:"#555", marginTop:2}}>{sch.memo}</div>}
                </div>
                <button onClick={()=>deleteSchedule(sch.id)} style={{background:"#fee", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", color:"#c0392b", fontSize:12}}>削除</button>
              </div>
            );
          })}

          {/* 過去の予定 */}
          {schedules.filter(s=>s.date<today).length > 0 && (
            <>
              <div style={{fontSize:13, fontWeight:700, color:"#aaa", margin:"16px 0 10px"}}>📁 過去の予定</div>
              {schedules.filter(s=>s.date<today).sort((a,b)=>b.date.localeCompare(a.date)).map(sch=>(
                <div key={sch.id} style={{...cardStyle, display:"flex", alignItems:"center", gap:12, marginBottom:8, opacity:0.6}}>
                  <div style={{width:48, textAlign:"center", flexShrink:0}}>
                    <div style={{fontSize:11, color:"#bbb"}}>{sch.date.slice(5).replace("-","月")}日</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13, color:"#666"}}>{spotName(sch.spotId)} ・ {sch.assignee}</div>
                    {sch.memo && <div style={{fontSize:11, color:"#aaa"}}>{sch.memo}</div>}
                  </div>
                  <button onClick={()=>deleteSchedule(sch.id)} style={{background:"#f5f5f5", border:"none", borderRadius:8, padding:"4px 8px", cursor:"pointer", color:"#bbb", fontSize:11}}>削除</button>
                </div>
              ))}
            </>
          )}

          <button className="add-btn" onClick={()=>{ setSchForm(emptySchedule); setShowScheduleForm(true); }}>＋ 巡回予定を追加</button>
        </div>
      )}

      {/* ===== 巡回記録フォーム ===== */}
      {showRecordForm && (
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setShowRecordForm(false)}>

            <div className="form-title">🔍 巡回記録を追加</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
              <div className="form-group">
                <label className="form-label">巡回日 *</label>
                <input type="date" className="form-input" value={recForm.date} onChange={e=>setRecForm(f=>({...f,date:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">巡回者</label>
                <select className="form-select" value={recForm.patrolledBy} onChange={e=>setRecForm(f=>({...f,patrolledBy:e.target.value}))}>

              </div>
            </div>
            <div className="form-group">
              <label className="form-label">スポット *</label>
              <select className="form-select" value={recForm.spotId} onChange={e=>setRecForm(f=>({...f,spotId:e.target.value}))}>

                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8}}>

              <button onClick={addSansaiStatus} style={{background:"var(--mist)", border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:12, fontWeight:600, color:"var(--forest)"}}>

              </button>
            </div>

            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
              <div className="form-group">
                <label className="form-label">全体的な状態</label>
                <select className="form-select" value={recForm.overallCondition} onChange={e=>setRecForm(f=>({...f,overallCondition:e.target.value}))}>

                </select>
              </div>
              <div className="form-group">
                <label className="form-label">不法採取の痕跡</label>

                      <input type="radio" name="illegal" checked={recForm.illegalActivity===(v==="あり")} onChange={()=>setRecForm(f=>({...f,illegalActivity:v==="あり"}))} />

                    </label>
                  ))}
                </div>
              </div>
            </div>

            {/* GPS取得 */}
            <GPSCapture

            <div className="form-group">
              <label className="form-label">📷 写真（複数可）</label>
              <div style={{display:"flex", gap:10, marginBottom:10}}>
                <label style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",

                  background:"var(--soil)", border:"2px dashed var(--fern)", textAlign:"center"}}>
                  <input type="file" accept="image/*" multiple style={{display:"none"}}
                    onChange={e=>handlePhotoUpload(e.target.files)} />
                  <span style={{fontSize:28}}>🖼</span>
                  <span style={{fontSize:12, fontWeight:600, color:"var(--moss)"}}>フォトから選択</span>
                  <span style={{fontSize:10, color:"#aaa"}}>複数枚OK</span>
                </label>
                <CameraCapture onCapture={handlePhotoUpload} label="カメラで撮影" autoOpen={autoCam} />

              {recForm.photos.length > 0 && (
                <div className="photo-grid">

                    </div>

                </div>
              )}
              {recForm.photos.length > 0 && (

            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>setShowRecordForm(false)}>キャンセル</button>
              <button className="btn-submit" onClick={saveRecord}>記録する</button>
            </div>
          </div>
        </div>

      {/* ===== スケジュールフォーム ===== */}
      {showScheduleForm && (
        <div className="form-overlay" onClick={e=>e.target===e.currentTarget&&setShowScheduleForm(false)}>
          <div className="form-box">
            <div className="form-title">📅 巡回予定を追加</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
              <div className="form-group">
                <label className="form-label">巡回日 *</label>
                <input type="date" className="form-input" value={schForm.date} onChange={e=>setSchForm(f=>({...f,date:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">担当者</label>
                <select className="form-select" value={schForm.assignee} onChange={e=>setSchForm(f=>({...f,assignee:e.target.value}))}>
                  <option value="">選択</option>
                  {MEMBERS_LIST.map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">スポット *</label>
              <select className="form-select" value={schForm.spotId} onChange={e=>setSchForm(f=>({...f,spotId:e.target.value}))}>
                <option value="">選択してください</option>
                {spots.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">目的・メモ</label>
              <input className="form-input" value={schForm.memo} onChange={e=>setSchForm(f=>({...f,memo:e.target.value}))} placeholder="例：タラノメ旬の確認" />
            </div>
            <div className="form-group">
              <label className="form-label">📅 登録先カレンダー</label>
              <div style={{display:"flex", flexDirection:"column", gap:6}}>
                {[
                  { id:"3", name:"tsurughi2999（メイン）", color:"#A47AE2" },
                  { id:"5", name:"カーマ3岳会 登山",       color:"#1967D2" },
                  { id:"6", name:"登山（一般）",            color:"#FA573C" },
                ].map(cal => (
                  <label key={cal.id} style={{display:"flex", alignItems:"center", gap:10, padding:"7px 12px",
                    border:`2px solid ${schForm.calendarId===cal.id ? cal.color : "#eee"}`,
                    borderRadius:8, cursor:"pointer",
                    background: schForm.calendarId===cal.id ? cal.color+"18" : "white"}}>
                    <input type="radio" name="patrolCal" value={cal.id}
                      checked={schForm.calendarId===cal.id}
                      onChange={()=>setSchForm(f=>({...f,calendarId:cal.id}))}
                      style={{accentColor:cal.color}} />
                    <span style={{width:10, height:10, borderRadius:"50%", background:cal.color, flexShrink:0}}></span>
                    <span style={{fontSize:13, fontWeight:600}}>{cal.name}</span>
                  </label>
                ))}
              </div>
            </div>
            <div style={{background:"var(--soil)", borderRadius:8, padding:"9px 14px", fontSize:12, color:"var(--moss)", marginBottom:12}}>
              📌 追加と同時にGoogleカレンダーへ自動登録されます
            </div>
            <div className="form-actions">
              <button className="btn-cancel" onClick={()=>setShowScheduleForm(false)}>キャンセル</button>
              <button className="btn-submit" onClick={saveSchedule} disabled={calLoading}>{calLoading ? "⏳ 登録中…" : "📅 追加＋カレンダー登録"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ===== 記録詳細モーダル ===== */}
      {selectedRecord && (
        <div className="form-overlay" onClick={()=>setSelectedRecord(null)}>
          <div className="form-box" onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh", overflowY:"auto"}}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:18, fontWeight:700, color:"var(--forest)"}}>{spotName(selectedRecord.spotId)}</div>
              <div style={{fontSize:12, color:"#888", marginTop:4}}>🗓 {selectedRecord.date} 👤 {selectedRecord.patrolledBy}</div>
            </div>

            {selectedRecord.illegalActivity && (
              <div style={{background:"#fdecea", border:"2px solid #c0392b", borderRadius:10, padding:"10px 14px", marginBottom:12, color:"#c0392b", fontWeight:700, fontSize:13}}>
                ⚠️ 不法採取・乱獲の痕跡あり
              </div>
            )}

            <div style={{marginBottom:12}}>
              <div style={{fontSize:13, fontWeight:700, color:"var(--forest)", marginBottom:8}}>🌿 山菜の生育状況</div>
              {selectedRecord.sansaiStatus.map((ss, i) => (
                <div key={i} style={{background:"var(--soil)", borderRadius:10, padding:"10px 14px", marginBottom:8}}>
                  <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:4}}>
                    <span style={{fontSize:20}}>{sansaiEmoji(ss.sansaiId)}</span>
                    <span style={{fontSize:14, fontWeight:700}}>{sansaiName(ss.sansaiId)}</span>
                    <span style={{fontSize:12, fontWeight:700, padding:"2px 8px", borderRadius:20,
                      background:STATUS_COLOR[ss.status]+"22", color:STATUS_COLOR[ss.status],
                      border:`1px solid ${STATUS_COLOR[ss.status]}`}}>{ss.status}</span>
                    <span style={{fontSize:11, fontWeight:700, color:QTY_COLOR[ss.quantity]}}>量：{ss.quantity}</span>
                  </div>
                  {ss.memo && <div style={{fontSize:12, color:"#555"}}>{ss.memo}</div>}
                </div>
              ))}
            </div>

            {selectedRecord.photos?.length > 0 && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:13, fontWeight:700, color:"var(--forest)", marginBottom:8}}>📷 写真</div>
                <div className="blog-photos">
                  {selectedRecord.photos.map((src,i)=>(
                    <div key={i} className="blog-photo" onClick={()=>setLightbox({images:selectedRecord.photos, index:i})}>
                      <img src={src} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {selectedRecord.notes && (
              <div style={{background:"var(--soil)", borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:13, color:"#444"}}>
                📝 {selectedRecord.notes}
              </div>
            )}
            {selectedRecord.gps && (
              <div style={{background:"#e8f5e9", borderRadius:10, padding:"12px 14px", marginBottom:12, border:"1px solid #a5d6a7"}}>
                <div style={{fontSize:12, fontWeight:700, color:"#2e7d32", marginBottom:6}}>📡 GPS位置情報</div>
                <div style={{fontSize:11, color:"#555", lineHeight:1.8}}>
                  緯度：{selectedRecord.gps.lat.toFixed(6)} / 経度：{selectedRecord.gps.lng.toFixed(6)}<br/>
                  精度：±{selectedRecord.gps.accuracy}m ・ 取得時刻：{selectedRecord.gps.timestamp}
                </div>
                <a href={`https://maps.google.com/?q=${selectedRecord.gps.lat},${selectedRecord.gps.lng}`}
                  target="_blank" rel="noopener noreferrer"
                  style={{display:"inline-block", marginTop:8, fontSize:12, fontWeight:600, color:"#1565c0",
                    background:"white", padding:"4px 14px", borderRadius:20, border:"1px solid #90caf9", textDecoration:"none"}}>
                  🗺 Googleマップで開く
                </a>
              </div>
            )}

            <div className="form-actions" style={{justifyContent:"space-between"}}>
              <button onClick={()=>setDeleteConfirm(selectedRecord)} style={{padding:"10px 16px", background:"#fee", border:"none", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600, color:"#c0392b"}}>
                🗑️ 削除
              </button>
              <button className="btn-submit" onClick={()=>setSelectedRecord(null)}>閉じる</button>
            </div>
          </div>
        </div>
      )}

      {/* 削除確認 */}
      {deleteConfirm && (
        <div className="form-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="form-box" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40, marginBottom:12}}>🗑️</div>
            <div style={{fontSize:17, fontWeight:700, color:"var(--forest)", marginBottom:8}}>この記録を削除しますか？</div>
            <div style={{fontSize:13, color:"#888", marginBottom:24}}>元に戻せません</div>
            <div style={{display:"flex", gap:10, justifyContent:"center"}}>
              <button className="btn-cancel" onClick={()=>setDeleteConfirm(null)}>キャンセル</button>
              <button style={{padding:"10px 24px", background:"#c0392b", color:"white", border:"none", borderRadius:8, cursor:"pointer", fontFamily:"'Noto Serif JP',serif", fontSize:14, fontWeight:600}}
                onClick={()=>deleteRecord(deleteConfirm.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {lightbox && <Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)} />}
    </div>
  );
}

function DangerPlantsView() {
  const [selected, setSelected] = useState(null);

  return (
    <div>
      {/* 警告バナー */}
      <div style={{background:"#c0392b", color:"white", borderRadius:12, padding:"14px 18px", marginBottom:20, display:"flex", gap:14, alignItems:"flex-start"}}>
        <div style={{fontSize:28, flexShrink:0}}>☠️</div>
        <div>
          <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>採取前に必ず確認！</div>
          <div style={{fontSize:12, lineHeight:1.7, opacity:0.95}}>山菜と有毒植物は見た目が非常に似ていることがあります。必ず複数の特徴で確認し、少しでも疑問があれば採取しないでください。</div>
        </div>
      </div>

      {/* 危険度凡例 */}
      <div style={{display:"flex", gap:10, marginBottom:16, flexWrap:"wrap"}}>
        {Object.entries(DANGER_LEVEL).map(([k,v])=>(
          <div key={k} style={{display:"flex", alignItems:"center", gap:6, background:v.bg, border:`1px solid ${v.color}`, borderRadius:20, padding:"4px 12px"}}>
            <span style={{fontSize:12, fontWeight:700, color:v.color}}>{v.badge}</span>
          </div>
        ))}
      </div>

      {/* 植物カード一覧 */}
      <div style={{display:"flex", flexDirection:"column", gap:14, marginBottom:24}}>
        {DANGER_PLANTS.map(plant => {
          const level = DANGER_LEVEL[plant.danger] ?? DANGER_LEVEL["注意"];
          return (
            <div key={plant.id}
              onClick={()=>setSelected(plant)}
              style={{background:"white", borderRadius:14, overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", border:`2px solid ${level.color}`, cursor:"pointer", transition:"transform 0.2s"}}
            >
              {/* 危険度ヘッダー */}
              <div style={{background:level.color, padding:"8px 16px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>

                    <div style={{fontSize:18, fontWeight:700, color:"#1a2e1a"}}>{plant.name}</div>

            <div className="form-box" onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh", overflowY:"auto"}}>
              {/* ヘッダー */}
              <div style={{background:level.color, margin:"-24px -24px 20px", padding:"20px 24px", borderRadius:"16px 16px 0 0", textAlign:"center"}}>
                <div style={{fontSize:52, marginBottom:4}}>{selected.emoji}</div>
                <div style={{fontSize:22, fontWeight:700, color:"white", fontFamily:"'Shippori Mincho',serif"}}>{selected.name}</div>
                <div style={{fontSize:13, color:"rgba(255,255,255,0.85)", marginTop:4}}>{level.badge}</div>

              <div style={{display:"flex", flexDirection:"column", gap:16}}>
                {/* 生育場所・季節 */}
