                  <div style={{fontSize:12, fontWeight:700, color:"#555", marginBottom:6}}>📍 生育場所・時期</div>
                  <div style={{fontSize:13, color:"#333"}}>{selected.region}</div>
                  <div style={{fontSize:13, color:"#333", marginTop:4}}>🗓 {selected.season}</div>
                </div>

                {/* 間違えやすい山菜 */}
                <div>
                  <div style={{fontSize:13, fontWeight:700, color:level.color, marginBottom:8}}>⚠️ 間違えやすい山菜</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                    {selected.similar.map(s=>(
                      <span key={s} style={{background:level.bg, border:`2px solid ${level.color}`, color:level.color, fontSize:13, fontWeight:700, padding:"6px 14px", borderRadius:20}}>{s}</span>
                    ))}
                  </div>
                </div>

                {/* 毒性・危険性 */}
                <div>
                  <div style={{fontSize:13, fontWeight:700, color:"#333", marginBottom:6}}>☠️ 毒性・危険性</div>
                  <div style={{fontSize:13, color:"#444", lineHeight:1.8}}>{selected.desc}</div>
                </div>

                {/* 見分け方 */}
                <div style={{background:"#e8f4fd", borderRadius:10, padding:"14px 16px", border:"1px solid #90caf9"}}>
                  <div style={{fontSize:13, fontWeight:700, color:"#1565c0", marginBottom:8}}>🔍 見分け方・チェックポイント</div>
                  <div style={{fontSize:13, color:"#333", lineHeight:1.8}}>{selected.howToDistinguish}</div>
                </div>

                {/* 警告 */}
                <div style={{background:"#fdecea", borderRadius:10, padding:"14px 16px", border:`2px solid ${level.color}`}}>
                  <div style={{fontSize:13, fontWeight:700, color:level.color, marginBottom:6}}>🚨 採取・取扱い注意</div>
                  <div style={{fontSize:13, color:"#c0392b", lineHeight:1.8, fontWeight:600}}>{selected.warning}</div>
                </div>
              </div>

              <div className="form-actions" style={{marginTop:20}}>
                <button className="btn-submit" onClick={()=>setSelected(null)}>閉じる</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function SansaiInfoView({ spots }) {
  const [entries, setEntries] = useState(SANSAI_DATA.map(s => ({
    ...s,
    customSpots: [], // おすすめスポット（追加可能）
    notes: "",       // 追加メモ
    isCustom: false, // ユーザー追加かどうか
  })));
  const [selected, setSelected] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [showEditForm, setShowEditForm] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const emptyForm = { name:"", emoji:"🌿", months:[], region:"", color:"#6aab5e", desc:"", customSpots:[], notes:"" };
  const [form, setForm] = useState(emptyForm);

  const EMOJIS = ["🌿","🍃","🌱","🌾","🌀","🧅","🍀","🪴","🍇","🍄","🌸","🎋","🌺","🥬","🌲"];
  const COLORS = ["#6aab5e","#2e7d32","#7b5ea7","#c8945e","#d4884a","#4caf6e","#a8c86e","#8dc66b","#9b7fc8","#c8d96e"];

  const toggleMonth = (m) => setForm(f => ({
    ...f,
    months: f.months.includes(m) ? f.months.filter(x=>x!==m) : [...f.months, m].sort((a,b)=>a-b)
  }));

  const handleAdd = () => {
    if (!form.name.trim() || form.months.length === 0) return;
    const newEntry = { ...form, id: Date.now(), isCustom: true };
    setEntries(prev => [...prev, newEntry]);
    setForm(emptyForm);
    setShowAddForm(false);
  };

  const openEdit = (entry) => {
    setForm({ ...entry });
    setShowEditForm(true);
    setSelected(null);
  };

  const handleEdit = () => {
    setEntries(prev => prev.map(e => e.id === form.id ? { ...e, ...form } : e));
    // 詳細表示中だったら更新
    if (selected?.id === form.id) setSelected({ ...selected, ...form });
    setShowEditForm(false);
  };

  const handleDelete = (id) => {
    setEntries(prev => prev.filter(e => e.id !== id));
    setSelected(null);
    setDeleteConfirm(null);
  };

  const addCustomSpot = () => {
    setForm(f => ({ ...f, customSpots: [...(f.customSpots||[]), ""] }));
  };
  const updateCustomSpot = (i, val) => {
    setForm(f => {
      const arr = [...(f.customSpots||[])];
      arr[i] = val;
      return { ...f, customSpots: arr };
    });
  };
  const removeCustomSpot = (i) => {
    setForm(f => ({ ...f, customSpots: (f.customSpots||[]).filter((_,idx)=>idx!==i) }));
  };

  // 詳細モーダルの編集用spot追加
  const [detailSpotInput, setDetailSpotInput] = useState("");
  const addDetailSpot = (entry) => {
    if (!detailSpotInput.trim()) return;
    const updated = { ...entry, customSpots: [...(entry.customSpots||[]), detailSpotInput.trim()] };
    setEntries(prev => prev.map(e => e.id === entry.id ? updated : e));
    setSelected(updated);
    setDetailSpotInput("");
  };
  const removeDetailSpot = (entry, i) => {
    const updated = { ...entry, customSpots: (entry.customSpots||[]).filter((_,idx)=>idx!==i) };
    setEntries(prev => prev.map(e => e.id === entry.id ? updated : e));
    setSelected(updated);
  };
  // 詳細モーダルのメモ更新
  const updateDetailNotes = (entry, val) => {
    const updated = { ...entry, notes: val };
    setEntries(prev => prev.map(e => e.id === entry.id ? updated : e));
    setSelected(updated);
  };

  const FormBody = ({ isEdit }) => (
    <>
      <div style={{display:"grid", gridTemplateColumns:"80px 1fr", gap:12}}>
        <div className="form-group">
          <label className="form-label">絵文字</label>
          <select className="form-select" value={form.emoji} onChange={e=>setForm(f=>({...f,emoji:e.target.value}))}>
            {EMOJIS.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">山菜名 *</label>
          <input className="form-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="例：ヨモギ" />
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">採取時期 * （複数選択）</label>
        <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
          {MONTHS.map((m,i) => (
            <div key={i} onClick={()=>toggleMonth(i+1)}
              style={{padding:"5px 10px", borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600,
                background: form.months.includes(i+1) ? "var(--forest)" : "var(--mist)",
                color: form.months.includes(i+1) ? "white" : "#666",
                border: `2px solid ${form.months.includes(i+1) ? "var(--forest)" : "transparent"}`,
                transition:"all 0.15s"
              }}>{m}</div>
          ))}
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">生育場所・地域</label>
        <input className="form-input" value={form.region} onChange={e=>setForm(f=>({...f,region:e.target.value}))} placeholder="例：沢沿い・湿地" />
      </div>

      <div className="form-group">
        <label className="form-label">カラー</label>
        <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
          {COLORS.map(c => (
            <div key={c} onClick={()=>setForm(f=>({...f,color:c}))}
              style={{width:28, height:28, borderRadius:"50%", background:c, cursor:"pointer",
                border: form.color===c ? "3px solid var(--ink)" : "3px solid transparent",
                transition:"all 0.15s"}} />
          ))}
          <input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))}
            style={{width:28, height:28, borderRadius:"50%", border:"none", cursor:"pointer", padding:0}} />
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">説明・特徴</label>
        <textarea className="form-textarea" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="味・調理法・採取のコツなど..." />
      </div>

      <div className="form-group">
        <label className="form-label">おすすめスポット</label>
        {(form.customSpots||[]).map((sp, i) => (
          <div key={i} style={{display:"flex", gap:8, marginBottom:6}}>
            <input className="form-input" value={sp} onChange={e=>updateCustomSpot(i,e.target.value)} placeholder="例：白山麓・瀬女エリア" style={{flex:1}} />
            <button onClick={()=>removeCustomSpot(i)} style={{background:"#fee", border:"none", borderRadius:8, padding:"0 10px", cursor:"pointer", color:"#c0392b", fontSize:16}}>✕</button>
          </div>
        ))}
        <button onClick={addCustomSpot} style={{background:"var(--mist)", border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:12, fontWeight:600, color:"var(--forest)", marginTop:4}}>
          ＋ スポットを追加
        </button>
        <div style={{marginTop:8}}>
          <label className="form-label">登録済みスポットから選択</label>
          <select className="form-select" onChange={e=>{
            if(e.target.value) setForm(f=>({...f, customSpots:[...(f.customSpots||[]), e.target.value]}));
            e.target.value="";
          }}>
            <option value="">-- スポットを選ぶ --</option>
            {spots.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
          </select>
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">メモ・覚え書き</label>
        <textarea className="form-textarea" style={{minHeight:60}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="採取の注意点、料理法のコツなど..." />
      </div>
    </>
  );

  const [infoTab, setInfoTab] = useState("sansai"); // sansai | danger

  return (
    <div>
      <div className="section-title">🌿 山菜図鑑</div>
      <div className="section-desc">採れる山菜の情報と、間違えやすい危険植物を確認できます。</div>

      {/* タブ切替 */}
      <div style={{display:"flex", gap:6, marginBottom:20, background:"var(--soil)", borderRadius:10, padding:4}}>
        <button onClick={()=>setInfoTab("sansai")} style={{
          flex:1, padding:"10px 4px", border:"none", borderRadius:8, cursor:"pointer",
          fontFamily:"'Noto Serif JP',serif", fontSize:13, fontWeight:600,
          background: infoTab==="sansai" ? "var(--forest)" : "transparent",
          color: infoTab==="sansai" ? "white" : "#888", transition:"all 0.2s",
        }}>🌿 山菜一覧</button>
        <button onClick={()=>setInfoTab("danger")} style={{
          flex:1, padding:"10px 4px", border:"none", borderRadius:8, cursor:"pointer",
          fontFamily:"'Noto Serif JP',serif", fontSize:13, fontWeight:600,
          background: infoTab==="danger" ? "#c0392b" : "transparent",
          color: infoTab==="danger" ? "white" : "#888", transition:"all 0.2s",
        }}>☠️ 危険植物</button>
      </div>

      {infoTab === "danger" && <DangerPlantsView />}
      {infoTab === "sansai" && <>

      {/* 統計バー */}
      <div style={{display:"flex", gap:10, marginBottom:20, flexWrap:"wrap"}}>
        {[
          { label:"登録山菜", val:`${entries.length}種`, icon:"🌿" },
          { label:"ユーザー追加", val:`${entries.filter(e=>e.isCustom).length}種`, icon:"✏️" },
          { label:"スポット登録", val:`${entries.reduce((acc,e)=>acc+(e.customSpots?.length||0),0)}箇所`, icon:"📍" },
        ].map(item=>(
          <div key={item.label} style={{flex:1, minWidth:90, background:"white", borderRadius:12, padding:"10px 14px", boxShadow:"0 2px 8px rgba(0,0,0,0.07)", textAlign:"center", border:"1px solid var(--mist)"}}>
            <div style={{fontSize:20}}>{item.icon}</div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--forest)"}}>{item.val}</div>
            <div style={{fontSize:11, color:"#888"}}>{item.label}</div>
          </div>
        ))}
      </div>

      <div className="sansai-grid">
        {entries.map(s => (
          <div key={s.id} className="sansai-card" style={{borderTopColor: s.color, position:"relative"}} onClick={()=>{ setSelected(s); setDetailSpotInput(""); }}>
            {s.isCustom && <div style={{position:"absolute", top:8, right:8, background:"var(--fern)", color:"white", fontSize:9, padding:"2px 6px", borderRadius:8, fontWeight:700}}>追加</div>}
            <div className="sansai-emoji">{s.emoji}</div>
            <div className="sansai-name">{s.name}</div>
            <div className="sansai-months">🗓 {s.months.map(m=>MONTHS[m-1]).join("・")}</div>
            <div className="sansai-region">📍 {s.region}</div>
            <div className="sansai-desc">{s.desc}</div>
            {s.customSpots?.length > 0 && (
              <div style={{marginTop:8, fontSize:11, color:"var(--moss)", fontWeight:600}}>📍 スポット {s.customSpots.length}件</div>
            )}
          </div>
        ))}
      </div>

      <button className="add-btn" style={{marginTop:8}} onClick={()=>{ setForm(emptyForm); setShowAddForm(true); }}>
        ＋ 山菜を追加
      </button>

      {/* ===== 詳細モーダル ===== */}
      {selected && (
        <div className="form-overlay" onClick={()=>setSelected(null)}>
          <div className="form-box" onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh", overflowY:"auto"}}>
            <div style={{textAlign:"center", marginBottom:16}}>
              <div style={{fontSize:56}}>{selected.emoji}</div>
              <div style={{fontSize:24, fontWeight:700, color:"var(--forest)", fontFamily:"'Shippori Mincho',serif"}}>{selected.name}</div>
              {selected.isCustom && <div style={{fontSize:11, color:"var(--moss)", marginTop:4}}>✏️ ユーザー追加</div>}
            </div>

            <div style={{display:"flex", flexDirection:"column", gap:14, fontSize:14}}>
              {/* 採取時期バッジ */}
              <div>
                <div style={{fontWeight:700, color:"var(--forest)", marginBottom:6}}>🗓 採取時期</div>
                <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                  {selected.months.map(m=>(
                    <span key={m} style={{background:"var(--forest)", color:"white", padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:600}}>{MONTHS[m-1]}</span>
                  ))}
                </div>
              </div>

              {/* 生育場所 */}
              <div>
                <div style={{fontWeight:700, color:"var(--forest)", marginBottom:4}}>📍 生育場所</div>
                <div style={{color:"#555"}}>{selected.region}</div>
              </div>

              {/* 説明 */}
              {selected.desc && (
                <div>
                  <div style={{fontWeight:700, color:"var(--forest)", marginBottom:4}}>📖 特徴・調理法</div>
                  <div style={{lineHeight:1.8, color:"#444"}}>{selected.desc}</div>
                </div>
              )}

              {/* おすすめスポット */}
              <div>
                <div style={{fontWeight:700, color:"var(--forest)", marginBottom:8}}>🏔 おすすめスポット</div>
                {selected.customSpots?.length > 0 ? (
                  <div style={{display:"flex", flexDirection:"column", gap:6, marginBottom:10}}>
                    {selected.customSpots.map((sp,i)=>(
                      <div key={i} style={{display:"flex", alignItems:"center", gap:8, background:"var(--soil)", borderRadius:8, padding:"8px 12px"}}>
                        <span style={{fontSize:16}}>📍</span>
                        <span style={{flex:1, fontSize:13}}>{sp}</span>
                        <button onClick={()=>removeDetailSpot(selected,i)} style={{background:"none", border:"none", cursor:"pointer", color:"#c0392b", fontSize:16, padding:"0 4px"}}>✕</button>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{color:"#bbb", fontSize:12, marginBottom:10}}>まだスポットが登録されていません</div>
                )}
                <div style={{display:"flex", gap:8}}>
                  <input className="form-input" value={detailSpotInput} onChange={e=>setDetailSpotInput(e.target.value)}
                    placeholder="スポット名を入力..." style={{flex:1, fontSize:13}} />
                  <button onClick={()=>addDetailSpot(selected)} className="btn-submit" style={{padding:"8px 14px", fontSize:13}}>追加</button>
                </div>
                {spots.length > 0 && (
                  <select className="form-select" style={{marginTop:8}} onChange={e=>{
                    if(e.target.value) { addDetailSpot({ ...selected, customSpots: [...(selected.customSpots||[]), e.target.value] }); }
                    e.target.value="";
                  }} onClick={e=>e.stopPropagation()}>
                    <option value="">-- 登録スポットから選択 --</option>
                    {spots.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
                  </select>
                )}
              </div>

              <div>
                <div style={{fontWeight:700, color:"var(--forest)", marginBottom:6}}>📝 メモ</div>

            <div style={{display:"flex", gap:10, justifyContent:"center"}}>
              <button className="btn-cancel" onClick={()=>setDeleteConfirm(null)}>キャンセル</button>
              <button style={{padding:"10px 24px", background:"#c0392b", color:"white", border:"none", borderRadius:8, cursor:"pointer", fontFamily:"'Noto Serif JP',serif", fontSize:14, fontWeight:600}}
                onClick={()=>handleDelete(deleteConfirm.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}
      </>}
    </div>
  );
}


// ===== HARVEST VIEW =====
function HarvestView({ spots, members }) {
  const today = new Date().toISOString().split("T")[0];
  const currentYear = new Date().getFullYear();
  const currentMonth = new Date().getMonth() + 1;

  const INITIAL_HARVESTS = [
    { id: 1, date: "2026-05-10", sansaiId: 3, spotId: 1, collectors: ["田中","鈴木"], amount: 800, unit: "g", condition: "良好", memo: "天ぷら・おひたし用", photos: [] },
    { id: 2, date: "2026-04-25", sansaiId: 2, spotId: 2, collectors: ["田中"], amount: 1200, unit: "g", condition: "良好", memo: "大型株が多かった", photos: [] },
  ];

  const [harvests, setHarvests] = useState(INITIAL_HARVESTS);
  const [showForm, setShowForm] = useState(false);
  const [selectedHarvest, setSelectedHarvest] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [filterSansai, setFilterSansai] = useState("all");
  const [filterMonth, setFilterMonth] = useState("all");
  const [viewMode, setViewMode] = useState("list"); // list | stats

  const UNITS = ["g", "kg", "束", "袋", "本", "個", "株"];
  const CONDITIONS = ["良好", "普通", "やや不良", "不良"];

  const emptyForm = {
    date: today, sansaiId: 1, spotId: spots[0]?.id ?? "",
    collectors: [], amount: "", unit: "g", condition: "良好", memo: "", photos: [], gps: null,
  };
  const [form, setForm] = useState(emptyForm);
  const [autoCam, setAutoCam] = useState(false);
  const harvestGPS = useGPS();

  const toggleCollector = (name) => {
    setForm(f => ({
      ...f,
      collectors: f.collectors.includes(name) ? f.collectors.filter(x=>x!==name) : [...f.collectors, name]
    }));
  };

  const handlePhotoUpload = (files) => {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = (e) => setForm(f => ({ ...f, photos: [...f.photos, e.target.result] }));
      reader.readAsDataURL(file);
    });
  };

  const saveHarvest = () => {
    if (!form.date || !form.sansaiId || !form.amount) return;
    setHarvests(prev => [{ id: Date.now(), ...form, sansaiId: Number(form.sansaiId), spotId: Number(form.spotId), amount: Number(form.amount), gps: harvestGPS.gps }, ...prev]);
    setForm(emptyForm);
    harvestGPS.clearGps();
    setAutoCam(false);
    setShowForm(false);
  };

  const deleteHarvest = (id) => {
    setHarvests(prev => prev.filter(h => h.id !== id));
    setDeleteConfirm(null);
    setSelectedHarvest(null);
  };

  const sansaiName = (id) => SANSAI_DATA.find(s => s.id === id)?.name ?? "不明";
  const sansaiEmoji = (id) => SANSAI_DATA.find(s => s.id === id)?.emoji ?? "🌿";
  const spotName = (id) => spots.find(s => s.id === Number(id))?.name ?? "不明";

  // フィルター適用
  const filtered = harvests.filter(h => {
    if (filterSansai !== "all" && h.sansaiId !== Number(filterSansai)) return false;
    if (filterMonth !== "all" && !h.date.startsWith(`2026-${String(filterMonth).padStart(2,"0")}`)) return false;
    return true;
  }).sort((a,b) => b.date.localeCompare(a.date));

  // 統計計算
  const totalByMonth = {};
  const totalBySansai = {};
  harvests.forEach(h => {
    const m = parseInt(h.date.split("-")[1]);
    const key = `${m}月`;
    if (!totalByMonth[key]) totalByMonth[key] = 0;
    if (h.unit === "kg") totalByMonth[key] += h.amount * 1000;
    else if (h.unit === "g") totalByMonth[key] += h.amount;

    const sn = sansaiName(h.sansaiId);
    if (!totalBySansai[sn]) totalBySansai[sn] = { amount: 0, count: 0, emoji: sansaiEmoji(h.sansaiId) };
    totalBySansai[sn].count += 1;
    if (h.unit === "kg") totalBySansai[sn].amount += h.amount * 1000;
    else if (h.unit === "g") totalBySansai[sn].amount += h.amount;
  });

  const thisMonthHarvests = harvests.filter(h => h.date.startsWith(`2026-${String(currentMonth).padStart(2,"0")}`));
  const totalAmountG = harvests.filter(h=>["g","kg"].includes(h.unit)).reduce((sum,h) => sum + (h.unit==="kg" ? h.amount*1000 : h.amount), 0);

  const cardStyle = { background:"white", borderRadius:14, padding:"16px", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", border:"1px solid var(--mist)", marginBottom:12 };

  return (
    <div>
      <div className="section-title">🧺 収穫記録</div>
      <div className="section-desc">採取した山菜の種類・量・メンバーを記録して収穫データを管理</div>

      {/* サマリーカード */}
      <div style={{display:"flex", gap:10, marginBottom:20, flexWrap:"wrap"}}>
        {[
          { label:"総記録数", val:`${harvests.length}件`, icon:"📋" },
          { label:"今月の採取", val:`${thisMonthHarvests.length}回`, icon:"📅" },
          { label:"累計重量", val: totalAmountG >= 1000 ? `${(totalAmountG/1000).toFixed(1)}kg` : `${totalAmountG}g`, icon:"⚖️" },
          { label:"採取山菜", val:`${Object.keys(totalBySansai).length}種`, icon:"🌿" },
        ].map(item => (
          <div key={item.label} style={{flex:1, minWidth:80, background:"white", borderRadius:12, padding:"10px 10px", boxShadow:"0 2px 8px rgba(0,0,0,0.07)", textAlign:"center", border:"1px solid var(--mist)"}}>
            <div style={{fontSize:18}}>{item.icon}</div>
            <div style={{fontSize:16, fontWeight:700, color:"var(--forest)"}}>{item.val}</div>
            <div style={{fontSize:10, color:"#888"}}>{item.label}</div>
          </div>
        ))}
      </div>

      {/* 表示切替 */}
      <div style={{display:"flex", gap:6, marginBottom:16, background:"var(--soil)", borderRadius:10, padding:4}}>
        {[{ id:"list", label:"📋 記録一覧" }, { id:"stats", label:"📊 統計" }].map(t => (
          <button key={t.id} onClick={()=>setViewMode(t.id)} style={{
            flex:1, padding:"9px 4px", border:"none", borderRadius:8, cursor:"pointer",
            fontFamily:"'Noto Serif JP',serif", fontSize:13, fontWeight:600,
            background: viewMode===t.id ? "var(--forest)" : "transparent",
            color: viewMode===t.id ? "white" : "#888", transition:"all 0.2s",
          }}>{t.label}</button>
        ))}
      </div>

      {/* ===== 記録一覧 ===== */}
      {viewMode === "list" && (
        <>
          {/* フィルター */}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16}}>
            <select className="form-select" value={filterSansai} onChange={e=>setFilterSansai(e.target.value)}>
              <option value="all">🌿 すべての山菜</option>
              {SANSAI_DATA.map(s=><option key={s.id} value={s.id}>{s.emoji} {s.name}</option>)}
            </select>
            <select className="form-select" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}>
              <option value="all">📅 すべての月</option>
              {MONTHS.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
          </div>

          {filtered.length === 0 && (
            <div style={{textAlign:"center", padding:40, color:"#ccc"}}>記録がありません</div>
          )}

          {filtered.map(h => (
            <div key={h.id} style={{...cardStyle, cursor:"pointer", borderLeft:`4px solid ${SANSAI_DATA.find(s=>s.id===h.sansaiId)?.color ?? "var(--fern)"}`}}
              onClick={()=>setSelectedHarvest(h)}>
              <div style={{display:"flex", alignItems:"flex-start", gap:12}}>
                <div style={{fontSize:36, flexShrink:0}}>{sansaiEmoji(h.sansaiId)}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap"}}>
                    <span style={{fontSize:16, fontWeight:700, color:"var(--forest)"}}>{sansaiName(h.sansaiId)}</span>
                    <span style={{fontSize:14, fontWeight:700, color:"var(--moss)"}}>{h.amount}{h.unit}</span>
                    <span style={{fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:20,
                      background: h.condition==="良好" ? "#e8f5e9" : "#fff8e1",
                      color: h.condition==="良好" ? "#2e7d32" : "#e65100"}}>{h.condition}</span>
                  </div>
                  <div style={{fontSize:11, color:"#888", marginBottom:4}}>
                    🗓 {h.date}　📍 {spotName(h.spotId)}
                  </div>
                  {h.collectors.length > 0 && (
                    <div style={{display:"flex", gap:4, flexWrap:"wrap", marginBottom:4}}>
                      {h.collectors.map(c=>(
                        <span key={c} style={{fontSize:10, background:"var(--forest)", color:"white", padding:"1px 7px", borderRadius:10, fontWeight:600}}>👤 {c}</span>
                      ))}
                    </div>
                  )}
                  {h.memo && <div style={{fontSize:12, color:"#666"}}>{h.memo}</div>}
                </div>
                {h.photos?.length > 0 && (
                  <div style={{width:52, height:52, borderRadius:8, overflow:"hidden", flexShrink:0}}>
                    <img src={h.photos[0]} style={{width:"100%", height:"100%", objectFit:"cover"}} />
                  </div>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {/* ===== 統計ビュー ===== */}
      {viewMode === "stats" && (
        <div>
          {/* 山菜別ランキング */}
          <div style={{...cardStyle, marginBottom:16}}>
            <div style={{fontSize:15, fontWeight:700, color:"var(--forest)", marginBottom:14}}>🏆 山菜別 収穫ランキング</div>
            {Object.entries(totalBySansai).sort((a,b)=>b[1].amount-a[1].amount).map(([name, data], i) => {
              const max = Math.max(...Object.values(totalBySansai).map(d=>d.amount));
              const pct = max > 0 ? (data.amount / max) * 100 : 0;
              return (
                <div key={name} style={{marginBottom:12}}>
                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                    <span style={{fontSize:13, fontWeight:600}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":"  "} {data.emoji} {name}</span>
                    <span style={{fontSize:13, fontWeight:700, color:"var(--moss)"}}>
                      {data.amount >= 1000 ? `${(data.amount/1000).toFixed(1)}kg` : `${data.amount}g`}　（{data.count}回）
                    </span>
                  </div>
                  <div style={{background:"#f0f0f0", borderRadius:20, height:10, overflow:"hidden"}}>
                    <div style={{width:`${pct}%`, height:"100%", background:"var(--fern)", borderRadius:20, transition:"width 0.5s"}} />
                  </div>
                </div>
              );
            })}
            {Object.keys(totalBySansai).length === 0 && <div style={{color:"#ccc", textAlign:"center", padding:20}}>データなし</div>}
          </div>

          {/* 月別収穫量 */}
          <div style={{...cardStyle, marginBottom:16}}>
            <div style={{fontSize:15, fontWeight:700, color:"var(--forest)", marginBottom:14}}>📅 月別 収穫量（g）</div>
            {Object.entries(totalByMonth).length === 0 ? (
              <div style={{color:"#ccc", textAlign:"center", padding:20}}>データなし</div>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {Object.entries(totalByMonth).sort((a,b) => parseInt(a[0]) - parseInt(b[0])).map(([month, amt]) => {
                  const max = Math.max(...Object.values(totalByMonth));
                  const pct = max > 0 ? (amt / max) * 100 : 0;
                  return (
                    <div key={month} style={{display:"flex", alignItems:"center", gap:10}}>
                      <div style={{width:32, fontSize:12, color:"#888", textAlign:"right", flexShrink:0}}>{month}</div>
                      <div style={{flex:1, background:"#f0f0f0", borderRadius:20, height:16, overflow:"hidden"}}>
                        <div style={{width:`${pct}%`, height:"100%", background:"var(--moss)", borderRadius:20}} />
                      </div>
                      <div style={{width:56, fontSize:12, fontWeight:700, color:"var(--forest)", textAlign:"right", flexShrink:0}}>
                        {amt >= 1000 ? `${(amt/1000).toFixed(1)}kg` : `${amt}g`}
                      </div>
                    </div>
                  );

              </div>

          </div>

          <div style={cardStyle}>
            <div style={{fontSize:15, fontWeight:700, color:"var(--forest)", marginBottom:14}}>👥 メンバー別 採取回数</div>

                  <div style={{width:28, height:28, borderRadius:"50%", background:"var(--forest)", color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, flexShrink:0}}>
                    {name.charAt(0)}
                  </div>
                  <div style={{flex:1, fontSize:14, fontWeight:600}}>{name}</div>

      )}

            <div style={{display:"grid", gridTemplateColumns:"2fr 1fr", gap:10}}>

                  <div><span style={{color:"#888", fontSize:12}}>スポット</span><br/><strong>{spotName(selectedHarvest.spotId)}</strong></div>
                  <div><span style={{color:"#888", fontSize:12}}>採取者</span><br/><strong>{selectedHarvest.collectors.join("・") || "未記録"}</strong></div>

              {selectedHarvest.memo && (

                  📝 {selectedHarvest.memo}
                </div>
              )}
              {selectedHarvest.gps && (
                <div style={{background:"#e8f5e9", borderRadius:10, padding:"12px 14px", border:"1px solid #a5d6a7"}}>
                  <div style={{fontSize:12, fontWeight:700, color:"#2e7d32", marginBottom:6}}>📡 採取地点GPS</div>
                  <div style={{fontSize:11, color:"#555", lineHeight:1.8}}>
                    緯度：{selectedHarvest.gps.lat.toFixed(6)} / 経度：{selectedHarvest.gps.lng.toFixed(6)}<br/>
                    精度：±{selectedHarvest.gps.accuracy}m ・ {selectedHarvest.gps.timestamp}

                  <a href={`https://maps.google.com/?q=${selectedHarvest.gps.lat},${selectedHarvest.gps.lng}`}
                    target="_blank" rel="noopener noreferrer"
                    style={{display:"inline-block", marginTop:8, fontSize:12, fontWeight:600, color:"#1565c0",
                      background:"white", padding:"4px 14px", borderRadius:20, border:"1px solid #90caf9", textDecoration:"none"}}>
                    🗺 Googleマップで開く
                  </a>
                </div>
              )}
              {selectedHarvest.photos?.length > 0 && (
                <div className="blog-photos">
                  {selectedHarvest.photos.map((src,i)=>(
                    <div key={i} className="blog-photo" onClick={()=>setLightbox({images:selectedHarvest.photos, index:i})}>
                      <img src={src} alt="" />
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="form-actions" style={{justifyContent:"space-between"}}>
              <button onClick={()=>setDeleteConfirm(selectedHarvest)}
                style={{padding:"10px 16px", background:"#fee", border:"none", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600, color:"#c0392b"}}>
                🗑️ 削除
              </button>
              <button className="btn-submit" onClick={()=>setSelectedHarvest(null)}>閉じる</button>
            </div>
          </div>
        </div>
      )}

      {/* 削除確認 */}
      {deleteConfirm && (
        <div className="form-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="form-box" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40, marginBottom:12}}>🗑️</div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--forest)", marginBottom:8}}>この記録を削除しますか？</div>
            <div style={{fontSize:13, color:"#888", marginBottom:24}}>この操作は元に戻せません。</div>
            <div style={{display:"flex", gap:10, justifyContent:"center"}}>
              <button className="btn-cancel" onClick={()=>setDeleteConfirm(null)}>キャンセル</button>
              <button style={{padding:"10px 24px", background:"#c0392b", color:"white", border:"none", borderRadius:8, cursor:"pointer", fontFamily:"'Noto Serif JP',serif", fontSize:14, fontWeight:600}}
                onClick={()=>deleteHarvest(deleteConfirm.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {lightbox && <Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)} />}
    </div>
  );
}

// ===== APP =====
function App() {
  const [tab, setTab] = useState("calendar");
  const [spots, setSpots] = useState(INITIAL_SPOTS);
  const [members, setMembers] = useState(INITIAL_MEMBERS.map((name, i) => ({ id: i+1, name, nickname:"", role: i===0?"採取リーダー":"一般", rank:"初級（初心者）", memo:"", joined:"2024-01-01", photo:null, avatar:null })));
  const [posts, setPosts] = useState(INITIAL_BLOG);
  const [calEvents, setCalEvents] = useState([]);
  const [weatherLocations, setWeatherLocations] = useState(INITIAL_WEATHER_LOCATIONS);
  const [toast, setToast] = useState(null);

  const showToast = (msg, type="ok") => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 3500);
  };

  // Google Calendar URL方式で自動登録
  // OAuth不要・アプリから直接Googleカレンダー登録画面へ遷移
  const handleScheduleSuccess = async ({ calendarId, title, date, endDate, description, location }) => {
    // 日付をGoogleカレンダー形式（YYYYMMDD）に変換
    const toGCalDate = (d) => d.replace(/-/g, "");
    const startDate = toGCalDate(date);
    // 終了日は翌日（終日イベントはendが翌日になるGoogle仕様）
    const endDateObj = new Date(endDate || date);
    endDateObj.setDate(endDateObj.getDate() + 1);
    const endDateStr = endDateObj.toISOString().split("T")[0].replace(/-/g, "");

    const params = new URLSearchParams({
      action: "TEMPLATE",
      text: title,
      dates: `${startDate}/${endDateStr}`,
      details: description || "",
      location: location || "",
      sf: "true",
      output: "xml",
    });

    const gcalUrl = `https://calendar.google.com/calendar/render?${params.toString()}`;

    // ローカル状態にも記録
    setCalEvents(prev => [...prev, { title, date, endDate: endDate || date, calendarId, location }]);

    // Googleカレンダー登録画面を開く
    window.open(gcalUrl, "_blank");
    showToast("✅ Googleカレンダーを開きました！内容を確認して保存してください");
  };

  const tabs = [
    { id: "calendar", label: "カレンダー", icon: "🍃" },
    { id: "plan",     label: "採取プラン", icon: "📅" },
    { id: "spots",    label: "スポット",   icon: "📍" },
    { id: "blog",     label: "ブログ",     icon: "📝" },
    { id: "info",     label: "山菜図鑑",   icon: "🌿" },
    { id: "members",  label: "メンバー",   icon: "👥" },
    { id: "patrol",   label: "パトロール", icon: "🔍" },
    { id: "harvest",  label: "収穫記録",   icon: "🧺" },
  ];

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        {toast && (
          <div style={{
            position:"fixed", top:16, left:"50%", transform:"translateX(-50%)",
            background: toast.type==="ok" ? "var(--forest)" : "#c0392b",
            color:"white", padding:"10px 24px", borderRadius:24,
            fontSize:14, fontWeight:600, zIndex:9999,
            boxShadow:"0 4px 20px rgba(0,0,0,0.25)",
          }}>
            {toast.msg}
          </div>
        )}
        <header className="header">
          <div>
            <div className="header-title">🌿 山菜採り手帳</div>
            <div className="header-subtitle">中部・北陸エリア | グループ管理</div>
          </div>
          <div style={{fontSize:12, color:"var(--bark)", textAlign:"right"}}>
            <div>👥 {members.length}名</div>
            <div>📍 {spots.length}スポット</div>
            {calEvents.length > 0 && <div style={{color:"var(--spring)"}}>📅 {calEvents.length}件予定</div>}
          </div>
        </header>

        <nav className="nav">
          {tabs.map(t => (
            <button key={t.id} className={`nav-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </nav>

        <main className="main">
          {tab === "calendar" && <CalendarView />}
          {tab === "plan"     && <PlanView spots={spots} onScheduleSuccess={handleScheduleSuccess} weatherLocations={weatherLocations} setWeatherLocations={setWeatherLocations} />}
          {tab === "spots"    && <SpotsView spots={spots} setSpots={setSpots} />}
          {tab === "blog"     && <BlogView posts={posts} setPosts={setPosts} spots={spots} members={members} />}
          {tab === "info"     && <SansaiInfoView spots={spots} />}
          {tab === "members"  && <MembersView members={members} setMembers={setMembers} />}
          {tab === "patrol"   && <PatrolView spots={spots} onScheduleSuccess={handleScheduleSuccess} showToast={showToast} />}
          {tab === "harvest"  && <HarvestView spots={spots} members={members} />}
        </main>
      </div>
    </>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
